<script>
const SETTINGS_KEY = 'mosk_jsonbin_settings';

function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; }
}
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}
window.jsonbinSettings = { getSettings, saveSettings };

window.storage = {
  async get(key) {
    const { apiKey, binId } = getSettings();
    if (!apiKey || !binId) return null;
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
        headers: { 'X-Master-Key': apiKey }
      });
      const data = await res.json();
      // obsługa zarówno [] jak i {"orders":[]}
      let record = data.record;
      if (Array.isArray(record)) {
        return { key, value: JSON.stringify(record) };
      } else if (record && Array.isArray(record.orders)) {
        return { key, value: JSON.stringify(record.orders) };
      }
      return { key, value: '[]' };
    } catch { return null; }
  },

  async set(key, value) {
    const { apiKey, binId } = getSettings();
    if (!apiKey || !binId) {
      localStorage.setItem(key, value);
      return { key, value };
    }
    try {
      const orders = JSON.parse(value);
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
        body: JSON.stringify(orders)
      });
      return { key, value };
    } catch { return null; }
  },

  async delete(key) { return window.storage.set(key, '[]'); },
  async list() { return { keys: ['mosk_orders'] }; }
};

</script>

function obliczJedn(s, w, ilosc) {
  if(!s||!w) return 0;
  const il = parseFloat(ilosc)||1;
  return Math.round(((parseFloat(s)*2 + parseFloat(w)*2) * il) / 10 * 10) / 10;
}

- klient pisze np. "98,5 i 102,5 cm szerokość, 216,5 i 220,5 cm wysokość" → JEDNA pozycja

Przypisanie wartości dla JEDNEJ pozycji drzwi:
- szerokosc = MNIEJSZA wartość spośród szerokości
- szer2 = WIĘKSZA wartość spośród szerokości (null jeśli podano tylko jedną)
- wysokosc = MNIEJSZA wartość spośród wysokości
- wys2 = WIĘKSZA wartość spośród wysokości (null jeśli podano tylko jedną)

Przykłady parsowania:
"A=214cm, B=81,5cm, D=92cm" (A=wys, B=szer min, D=szer max) → szerokosc=81.5, szer2=92, wysokosc=214, wys2=null
"98,5/102,5 x 216,5/220,5" → szerokosc=98.5, szer2=102.5, wysokosc=216.5, wys2=220.5
"szerokość 80cm i 84cm, wysokość 210cm" → szerokosc=80, szer2=84, wysokosc=210, wys2=null

function obliczDrzwi(pozycje){
  let profilMb=0,narozniki=0,poprzeczki=0,uchwyty=0,zawiasy=0,samodomykajace=0,magnesy=0,klamki=0,uszczelkaMb=0,szczotkaMb=0,kartony=0,radelka=0,instrukcje=0,wkrety=0;
  (pozycje||[]).filter(p=>p.isDrzwi).forEach(p=>{
    const s=parseFloat(p.szerokosc)||0, w=parseFloat(p.wysokosc)||0, il=parseInt(p.ilosc)||1;
    if(!s||!w) return;
    const sP=s+4, wP=w+4;
    profilMb += ((sP*2+wP*2)/100)*il;
    narozniki += 4*il;
    if(p.poprzeczka){ poprzeczki+=il; uchwyty+=2*il; }
    zawiasy += 2*il;
    samodomykajace += (parseInt(p.samodomykajacyL)||0) + (parseInt(p.samodomykajacyP)||0);
    magnesy += 3*il;
    klamki += 2*il;
    uszczelkaMb += ((2*sP+wP)*1.1/100)*il;
    szczotkaMb += ((sP+wP)*1.1/100)*il;
    kartony += il;
    radelka += il;
    instrukcje += il;
    wkrety += 12*il;
  });
  const r=v=>Math.round(v*100)/100;
  // siatka - jak w oknie, szer zawsze mniejszy wymiar drzwi
  let siatkaCz100=0,siatkaCz140=0,siatkaCz160=0,siatkaSz100=0,siatkaSz140=0,siatkaSz160=0;
  (pozycje||[]).filter(p=>p.isDrzwi).forEach(p=>{
    const s=parseFloat(p.szerokosc)||0, w=parseFloat(p.wysokosc)||0, il=parseInt(p.ilosc)||1;
    if(!s||!w) return;
    const dluzszy=Math.max(s,w), krotszy=Math.min(s,w);
    const siatkaDl=Math.round((dluzszy+20)/100*il*100)/100;
    const kS=p.kolorSiatki||"Czarna";
    if(krotszy<=90){ if(kS==="Szara") siatkaSz100+=siatkaDl; else siatkaCz100+=siatkaDl; }
    else if(krotszy<=130){ if(kS==="Szara") siatkaSz140+=siatkaDl; else siatkaCz140+=siatkaDl; }
    else { if(kS==="Szara") siatkaSz160+=siatkaDl; else siatkaCz160+=siatkaDl; }
  });
  return {profilMb:r(profilMb),narozniki,poprzeczki,uchwyty,zawiasy,samodomykajace,magnesy,klamki,uszczelkaMb:r(uszczelkaMb),szczotkaMb:r(szczotkaMb),kartony,radelka,instrukcje,wkrety,siatkaCz100:r(siatkaCz100),siatkaCz140:r(siatkaCz140),siatkaCz160:r(siatkaCz160),siatkaSz100:r(siatkaSz100),siatkaSz140:r(siatkaSz140),siatkaSz160:r(siatkaSz160)};
}

  function importHistCSV(year,text){

    const idx=(n)=>header.findIndex(h=>h.includes(n));
    const iNr=idx("nr"),iFirma=idx("firma"),iData=idx("data"),iKlient=Math.max(idx("klient"),idx("imię")),iMiasto=idx("miasto"),iTel=idx("tel"),iSzer=idx("szer"),iWys=idx("wys"),iGl=idx("głęb"),iKR=idx("ramki"),iKS=idx("siatki"),iBl=idx("blaszka"),iIl=idx("ilość");
    const grouped={};
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(";");
      if(cols.length<5||!cols[iSzer]) continue;
      const nr=cols[iNr]||("IMP-"+i);
      if(!grouped[nr]) grouped[nr]={id:Date.now()+i,numerZlecenia:nr,firma:cols[iFirma]||"F",data:cols[iData]||"",klientImie:cols[iKlient]||"",klientMiasto:cols[iMiasto]||"",telefon:cols[iTel]||"",uwagi:"",pozycje:[]};

    }
    const arr=Object.values(grouped);
    const updated={...histOrders,[year]:arr};

      if(r.pozycje?.length) r.pozycje.forEach(p=>{

  async function allegroRefresh(kontaId){
    const clientId=localStorage.getItem('allegro_client_id')||'';
    const secret=localStorage.getItem('allegro_client_secret')||'';
    const refreshes=JSON.parse(localStorage.getItem('allegro_refreshes')||'{}');
    const rt=refreshes[kontaId];
    if(!rt||!clientId||!secret) return false;
    try{
      const r=await fetch('https://allegro-proxy.favour-biuro.workers.dev/refresh?refresh_token='+encodeURIComponent(rt),{
        method:'POST',
        headers:{'Authorization':'Basic '+btoa(clientId+':'+secret)}
      });
      const d=await r.json();
      if(d.access_token){
        const tokens=JSON.parse(localStorage.getItem('allegro_tokens')||'{}');
        tokens[kontaId]=d.access_token;
        if(d.refresh_token) refreshes[kontaId]=d.refresh_token;
        localStorage.setItem('allegro_tokens',JSON.stringify(tokens));
        localStorage.setItem('allegro_refreshes',JSON.stringify(refreshes));
        setAllegroTokens({...tokens});
        return true;
      }
    }catch(e){}
    return false;
  }
  function allegroLogin(kontaId){
    const clientId=localStorage.getItem('allegro_client_id')||"";
    const secret=localStorage.getItem('allegro_client_secret')||"";
    if(!clientId||!secret){setAllegroError("Najpierw wpisz i zapisz Client ID oraz Client Secret");return;}
    localStorage.setItem('allegro_active', kontaId);
    setAllegroActive(kontaId);
    const url='https://allegro.pl/auth/oauth/authorize?response_type=code&client_id='+encodeURIComponent(clientId)+'&redirect_uri='+encodeURIComponent('https://oktomo.github.io/moskitiery');
    window.location.href=url;
  }

  async function msgLoadThreads(kontoId, retried){
    const k=kontoId||msgKontoRef.current;
    const tok=allegroTokens[k]||"";
    if(!tok){setMsgError("Brak tokenu dla konta "+k+". Zaloguj się w Admin → Allegro.");return;}
    msgKontoRef.current=k;
    setMsgKonto(k);
    setMsgLoading(true); setMsgError(""); setMsgThreads([]); setMsgActiveThread(null); setMsgConvo([]);
    try{
      const r=await fetch("https://allegro-proxy.favour-biuro.workers.dev/api/messaging/threads?limit=20&offset=0",{
        headers:{
          "Authorization":"Bearer "+tok,
          "Accept":"application/vnd.allegro.public.v1+json",
          "Accept-Language":"pl-PL"
        }
      });
      if(r.status===401){
        if(retried){setMsgError("Sesja wygasła — zaloguj się ponownie w Admin → Allegro.");setMsgLoading(false);return;}
        const ok=await allegroRefresh(k);
        if(ok){msgLoadThreads(k,true);return;}
        setMsgError("Sesja wygasła — zaloguj się ponownie w Admin → Allegro.");
        setMsgLoading(false);return;
      }
      if(!r.ok){
        let errText="";
        try{const ed=await r.json();errText=JSON.stringify(ed);}catch{}
        setMsgError("Błąd API "+r.status+": "+errText);
        setMsgLoading(false);return;
      }
      const d=await r.json();
      setMsgThreads(d.threads||[]);
    }catch(e){setMsgError("Błąd połączenia: "+e.message);}
    setMsgLoading(false);
  }

  async function msgLoadConvo(thread, retried){
    const k=msgKontoRef.current;
    const tok=allegroTokens[k]||"";
    if(!tok) return;
    setMsgActiveThread(thread);
    setMsgConvoLoading(true); setMsgConvo([]); setMsgReply(""); setMsgAttachments([]); setMsgSendOk(false); setMsgSendError("");
    try{
      const r=await fetch("https://allegro-proxy.favour-biuro.workers.dev/api/messaging/threads/"+thread.id+"/messages",{
        headers:{"Authorization":"Bearer "+tok,"Accept":"application/vnd.allegro.public.v1+json","Accept-Language":"pl-PL"}
      });
      if(r.status===401&&!retried){const ok=await allegroRefresh(k);if(ok){msgLoadConvo(thread,true);return;}}
      if(r.ok){const d=await r.json();setMsgConvo(d.messages||[]);}
    }catch(e){}
    setMsgConvoLoading(false);
  }

  async function msgUploadAttachment(file){
    const tok=allegroTokens[msgKontoRef.current]||"";
    const r=await fetch("https://allegro-proxy.favour-biuro.workers.dev/api/messaging/message-attachments",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+tok,
        "Accept":"application/vnd.allegro.public.v1+json",
        "Content-Type":file.type||"application/octet-stream",
        "Content-Disposition":"attachment; filename="+file.name
      },
      body:file
    });
    if(!r.ok){
      let errText="";
      try{const ed=await r.json();errText=JSON.stringify(ed);}catch{}
      setMsgSendError("Błąd uploadu zdjęcia "+r.status+": "+errText);
      return null;
    }
    const d=await r.json();
    if(!d.id){setMsgSendError("Upload zdjęcia nie zwrócił ID: "+JSON.stringify(d));return null;}
    return d.id;
  }

  async function msgSend(){
    if(!msgActiveThread) return;
    if(!msgReply.trim()&&msgAttachments.length===0) return;
    const tok=allegroTokens[msgKontoRef.current]||"";
    if(!tok){setMsgSendError("Brak tokenu.");return;}
    setMsgSending(true); setMsgSendError(""); setMsgSendOk(false);
    try{
      const attIds=[];
      for(var ai=0;ai<msgAttachments.length;ai++){
        const id=await msgUploadAttachment(msgAttachments[ai].file);
        if(id) attIds.push({id:id});
      }
      const body={text:msgReply};
      if(attIds.length>0) body.attachments=attIds;
      const r=await fetch("https://allegro-proxy.favour-biuro.workers.dev/api/messaging/threads/"+msgActiveThread.id+"/messages",{
        method:"POST",
        headers:{"Authorization":"Bearer "+tok,"Accept":"application/vnd.allegro.public.v1+json","Content-Type":"application/vnd.allegro.public.v1+json"},
        body:JSON.stringify(body)
      });
      if(r.ok){
        setMsgReply(""); setMsgAttachments([]); setMsgSendOk(true);
        await msgLoadConvo(msgActiveThread,false);
        setTimeout(function(){setMsgSendOk(false);},3000);
      } else {
        const e=await r.json();
        setMsgSendError("Błąd "+(e.errors?e.errors[0]&&e.errors[0].message:"Nieznany błąd API"));
      }
    }catch(e){setMsgSendError("Błąd: "+e.message);}
    setMsgSending(false);
  }

  async function allegroLoadMessages(tokenParam, kontaId){
    const activeKonto=kontaId||allegroActive;
    const tok=tokenParam||allegroTokens[activeKonto]||allegroToken;
    if(!tok){setAllegroError("Nie jesteś zalogowany do Allegro");return;}
    setAllegroActive(activeKonto);
    setAllegroMessages([]);
    setAllegroLoading(true); setAllegroError("");
    try{
      const r=await fetch('https://allegro-proxy.favour-biuro.workers.dev/api/messaging/threads?limit=20',{
        headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.allegro.public.v1+json'}
      });
      if(r.status===401){const refreshed=await allegroRefresh(activeKonto);if(refreshed){allegroLoadMessages(allegroTokens[activeKonto],activeKonto);return;}const t={...allegroTokens};delete t[activeKonto];localStorage.setItem('allegro_tokens',JSON.stringify(t));setAllegroTokens(t);setAllegroError('Sesja wygasła — zaloguj się ponownie');setAllegroLoading(false);return;}
      const d=await r.json();
      // For each thread get messages
      const threads=d.threads||[];
      const messagesArr=[];
      for(const t of threads.slice(0,10)){
        const mr=await fetch('https://allegro-proxy.favour-biuro.workers.dev/api/messaging/threads/'+t.id+'/messages',{
          headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.allegro.public.v1+json'}
        });
        const md=await mr.json();
        const msgs=md.messages||[];
        const lastMsg=msgs[msgs.length-1];
        messagesArr.push({
          threadId:t.id,
          allegroOrderId:t.relatedObject?.id||"",
          interlocutor:t.interlocutor?.login||"—",
          subject:t.subject||"—",
          lastMessage:lastMsg?.text||"",
          date:lastMsg?.createdAt||"",
          unread:t.hasUnreadMessages
        });
      }
      setAllegroMessages(messagesArr);
    }catch(e){setAllegroError("Błąd: "+e.message);}
    setAllegroLoading(false);
  }

          let siatkaSzara100=0, siatkaSzara140=0, siatkaSzara160=0;
          let narozniki=0, uszczelka=0, blaszki=0, blachowkret=0;
          let radełko=0, instrukcja=0, karton=0;
          let poprzeczki=0, laczniki=0;

          filteredOrders.forEach(o=>{
            const pozOkno = (o.pozycje||[]).filter(p=>!p.isDrzwi);
            let totalSztOk = 0;
            pozOkno.forEach(p=>{
              const szer = parseFloat(p.szerokosc)||0;
              const wys = parseFloat(p.wysokosc)||0;
              const il = parseInt(p.ilosc)||1;
              const kR = p.kolorRamki||"";
              const kS = p.kolorSiatki||"Czarna";
              if(!szer||!wys) return;

              // Profil mb
              const profilCm = ((szer-3.4)*2 + (wys-3.4)*2) * prodOdpadProfil;
              const profilMb = profilCm/100 * il;
              if(RAL_KOLORY.some(k=>kR.includes(k))) profilRAL += profilMb;
              else profilStruktura += profilMb;

              // Siatka
              const krotszy = Math.min(szer, wys);
              const dluzszy = Math.max(szer, wys);
              const siatkaDl = (dluzszy + 20)/100 * il; // mb
              if(krotszy <= 90){
                if(kS==="Szara") siatkaSzara100+=siatkaDl; else siatkaCzarna100+=siatkaDl;
              } else if(krotszy <= 130){
                if(kS==="Szara") siatkaSzara140+=siatkaDl; else siatkaCzarna140+=siatkaDl;
              } else {
                if(kS==="Szara") siatkaSzara160+=siatkaDl; else siatkaCzarna160+=siatkaDl;
              }

              // Narożniki 5 szt/szt
              narozniki += 5*il;

              // Uszczelka mb (obwód)
              const uszMb = ((szer+wys)*2)/100 * il;
              uszczelka += uszMb;

              // Blaszki i blachowkręty
              const bl = parseInt(p.blaszRozmiar)||0;
              const blIl = parseInt(p.blaszIlosc)||(bl?8:0);
              blaszki += blIl*il;
              blachowkret += blIl*il;

              // Poprzeczka gdy max>=170
              if(Math.max(szer,wys)>=170){
                const popDl = (krotszy-3.4)/100 * il;
                poprzeczki += popDl;
                laczniki += 2*il;
              }

              totalSztOk += il;
            });

            if(totalSztOk>0){
              radełko += 1;
              instrukcja += 1;
              karton += Math.ceil(totalSztOk/5);
            }
          });

          // Drzwi
          let drzwiProfilMb=0,drzwiNarozniki=0,drzwiPoprzeczki=0,drzwiUchwyty=0,drzwiZawiasy=0,drzwiSamodomykajace=0,drzwiMagnesy=0,drzwiKlamki=0,drzwiUszczelka=0,drzwiSzczotka=0,drzwiKartony=0,drzwiRadelka=0,drzwiInstrukcje=0,drzwiWkrety=0;
          filteredOrders.forEach(o=>{
            const pD=obliczDrzwi((o.pozycje||[]).filter(p=>p.isDrzwi));
            drzwiProfilMb+=pD.profilMb; drzwiNarozniki+=pD.narozniki; drzwiPoprzeczki+=pD.poprzeczki;
            drzwiUchwyty+=pD.uchwyty; drzwiZawiasy+=pD.zawiasy; drzwiMagnesy+=pD.magnesy;
            drzwiKlamki+=pD.klamki; drzwiUszczelka+=pD.uszczelkaMb; drzwiSzczotka+=pD.szczotkaMb;
            drzwiSamodomykajace+=pD.samodomykajace; drzwiKartony+=pD.kartony; drzwiRadelka+=pD.radelka; drzwiInstrukcje+=pD.instrukcje; drzwiWkrety+=pD.wkrety;
          });

          const r2 = v=>Math.round(v*100)/100;

          return (
            <div style={{maxWidth:900}}>
              {/* Filters & settings */}
              <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                <div>
                  <span className="lbl">Firma</span>
                  <select value={prodFirma} onChange={e=>setProdFirma(e.target.value)}>
                    <option value="all">Wszystkie</option>
                    {FIRMY.map(f=><option key={f.kod} value={f.kod}>{f.nazwa}</option>)}
                  </select>
                </div>
                <div>
                  <span className="lbl">Odpad profil</span>
                  <input type="number" value={prodOdpadProfil} onChange={e=>setProdOdpadProfil(parseFloat(e.target.value)||1.1)} step="0.01" style={{width:70}}/>
                </div>
                <div>
                  <span className="lbl">Odpad siatka</span>
                  <input type="number" value={prodOdpadSiatka} onChange={e=>setProdOdpadSiatka(parseFloat(e.target.value)||1.1)} step="0.01" style={{width:70}}/>
                </div>
                <div>
                  <span className="lbl">Od</span>
                  <input type="date" value={prodDataOd} onChange={e=>setProdDataOd(e.target.value)} style={{width:130}}/>
                </div>
                <div>
                  <span className="lbl">Do</span>
                  <input type="date" value={prodDataDo} onChange={e=>setProdDataDo(e.target.value)} style={{width:130}}/>
                </div>
                <button className="btn-sm" onClick={()=>{
                  const now=new Date();
                  const mon=new Date(now.getFullYear(),now.getMonth(),1);
                  setProdDataOd(mon.toISOString().slice(0,10));
                  setProdDataDo(now.toISOString().slice(0,10));
                }}>Ten miesiąc</button>
                <button className="btn-sm" onClick={()=>{
                  const now=new Date();
                  const day=now.getDay()||7;
                  const mon=new Date(now); mon.setDate(now.getDate()-day+1);
                  setProdDataOd(mon.toISOString().slice(0,10));
                  setProdDataDo(now.toISOString().slice(0,10));
                }}>Ten tydzień</button>
                <button className="btn-sm" onClick={()=>{setProdDataOd("");setProdDataDo("");}}>Wszystkie</button>
                <span style={{fontSize:11,color:"#3a6a3a",marginLeft:"auto"}}>
                  {filteredOrders.length} zamówień
                </span>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                {/* Profil */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#7fcf7f",marginBottom:12}}>🔩 Profil aluminiowy</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      <tr><td style={{color:"#5a8a5a",paddingBottom:6}}>RAL (Biały/Brąz/Antracyt/Czarny)</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{r2(profilRAL)} mb</td></tr>
                      <tr><td style={{color:"#5a8a5a"}}>Struktura drewna</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{r2(profilStruktura)} mb</td></tr>
                      <tr style={{borderTop:"1px solid #1e3a1e"}}><td style={{color:"#7fcf7f",paddingTop:8,fontWeight:700}}>RAZEM</td><td style={{textAlign:"right",color:"#7fcf7f",fontWeight:700,paddingTop:8}}>{r2(profilRAL+profilStruktura)} mb</td></tr>
                    </tbody>
                  </table>
                </div>

                {/* Siatka */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#7fcf7f",marginBottom:12}}>🕸️ Siatka</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Czarna 100cm",siatkaCzarna100],["Czarna 140cm",siatkaCzarna140],["Czarna 160cm",siatkaCzarna160],["Szara 100cm",siatkaSzara100],["Szara 140cm",siatkaSzara140],["Szara 160cm",siatkaSzara160]].map(([l,v])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:4}}>{l}</td><td style={{textAlign:"right",color:v>0?"#9fcf9f":"#2a4a2a",fontWeight:700}}>{r2(v)} mb</td></tr>
                      ))}
                      <tr style={{borderTop:"1px solid #1e3a1e"}}><td style={{color:"#7fcf7f",paddingTop:8,fontWeight:700}}>RAZEM</td><td style={{textAlign:"right",color:"#7fcf7f",fontWeight:700,paddingTop:8}}>{r2(siatkaCzarna100+siatkaCzarna140+siatkaCzarna160+siatkaSzara100+siatkaSzara140+siatkaSzara160)} mb</td></tr>
                    </tbody>
                  </table>
                </div>

                {/* Akcesoria */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#7fcf7f",marginBottom:12}}>🔧 Akcesoria</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Narożniki",narozniki,"szt"],["Uszczelka",r2(uszczelka),"mb"],["Blaszki",blaszki,"szt"],["Blachowkręty",blachowkret,"szt"],["Poprzeczki",r2(poprzeczki),"mb"],["Łączniki poprzeczek",laczniki,"szt"]].map(([l,v,u])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:6}}>{l}</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{v} {u}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Opakowanie */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#7fcf7f",marginBottom:12}}>📦 Opakowanie & narzędzia</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Karton",karton,"szt"],["Instrukcja",instrukcja,"szt"],["Radełko",radełko,"szt"]].map(([l,v,u])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:6}}>{l}</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{v} {u}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Drzwi */}
              {drzwiKartony>0&&(
                <div className="card" style={{gridColumn:"1/-1"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#90b8df",marginBottom:12}}>🚪 Drzwi moskitierowe</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                    {[["Profil",r2(drzwiProfilMb),"mb"],["Uszczelka",r2(drzwiUszczelka),"mb"],["Szczotka",r2(drzwiSzczotka),"mb"],["Narożniki",drzwiNarozniki,"szt"],["Poprzeczki",drzwiPoprzeczki,"szt"],["Uchwyty poprz.",drzwiUchwyty,"szt"],["Zawiasy",drzwiZawiasy,"szt"],["Magnesy",drzwiMagnesy,"szt"],["Klamki",drzwiKlamki,"szt"],["Samodomykające",drzwiSamodomykajace,"szt"],["Kartony",drzwiKartony,"szt"],["Radełka",drzwiRadelka,"szt"],["Wkręty",drzwiWkrety,"szt"]].map(([l,v,u])=>(
                      <div key={l} style={{background:"#0c1428",border:"1px solid #1e2a4e",borderRadius:6,padding:"8px 12px"}}>
                        <div style={{fontSize:16,fontWeight:900,color:"#90b8df"}}>{v}</div>
                        <div style={{fontSize:10,color:"#4a6a9a"}}>{u}</div>
                        <div style={{fontSize:10,color:"#3a5a8a",letterSpacing:".05em"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}
        {/* ══ USTAWIENIA ══ */}
        {tab==="ustawienia" && (
          <div>
            <div className="card" style={{maxWidth:520}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#7fcf7f",marginBottom:14}}>☁ Synchronizacja JSONBin</div>
              <div style={{marginBottom:14}}>
                <span className="lbl">Master Key</span>
                <input value={settings.apiKey||""} onChange={e=>setSettings(s=>({...s,apiKey:e.target.value}))} placeholder="$2b$10$..." style={{fontFamily:"monospace",fontSize:12}}/>
                <span className="lbl" style={{marginTop:12}}>Klucz API Claude (AI parsowanie)</span>
                <input value={claudeKey} onChange={e=>{setClaudeKey(e.target.value);localStorage.setItem("claude_api_key",e.target.value);}} placeholder="sk-ant-..." style={{fontFamily:"monospace",fontSize:12}}/>
              </div>
              <div style={{marginBottom:14}}>
                <span className="lbl">Bin ID</span>
                <input value={settings.binId||""} onChange={e=>setSettings(s=>({...s,binId:e.target.value}))} placeholder="64f3a1b2c8a3e12345678901" style={{fontFamily:"monospace",fontSize:12}}/>
              </div>
              <button className="btn" onClick={()=>{window.jsonbinSettings.saveSettings(settings);setSettingsSaved(true);setTimeout(()=>setSettingsSaved(false),2000);}}>
                💾 Zapisz
              </button>
              {settingsSaved&&<span style={{marginLeft:12,color:"#7fcf7f",fontSize:12}}>✓ Zapisano!</span>}
              <div style={{marginTop:14,padding:"8px 12px",background:settings.apiKey&&settings.binId?"#0c180c":"#1a1000",border:`1px solid ${settings.apiKey&&settings.binId?"#1a3a1a":"#3a2a00"}`,borderRadius:4,fontSize:12,color:settings.apiKey&&settings.binId?"#5a9a5a":"#8a7a3a"}}>
                {settings.apiKey&&settings.binId?"✅ Synchronizacja aktywna":"⚠️ Brak konfiguracji — dane lokalne"}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(React.StrictMode,null,React.createElement(App)));
</script>
</body></html>
