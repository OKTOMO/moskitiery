const SETTINGS_KEY = 'mosk_jsonbin_settings';

function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; }
}
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}
window.jsonbinSettings = { getSettings, saveSettings };

window.storage = {
  async get(key) {
    const { apiKey, binId } = getSettings();
    if (!apiKey || !binId) return null;
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
        headers: { 'X-Master-Key': apiKey }
      });
      const data = await res.json();
      // obsługa zarówno [] jak i {"orders":[]}
      let record = data.record;
      if (Array.isArray(record)) {
        return { key, value: JSON.stringify(record) };
      } else if (record && Array.isArray(record.orders)) {
        return { key, value: JSON.stringify(record.orders) };
      }
      return { key, value: '[]' };
    } catch { return null; }
  },

  async set(key, value) {
    const { apiKey, binId } = getSettings();
    if (!apiKey || !binId) {
      localStorage.setItem(key, value);
      return { key, value };
    }
    try {
      const orders = JSON.parse(value);
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
        body: JSON.stringify(orders)
      });
      return { key, value };
    } catch { return null; }
  },

  async delete(key) { return window.storage.set(key, '[]'); },
  async list() { return { keys: ['mosk_orders'] }; }
};

// Normalizuje głębokość do mm — jeśli AI zwróciło wartość w cm (1-3.5), przelicza ×10
function normalizujGlebokosc(g) {
  const v = parseFloat(g);
  if (!v || isNaN(v)) return DOMYSLNA_GLEBOKOS;
  // Wartości < 5 traktuj jako cm (1.0–4.9 cm → 10–49 mm)
  // np. 1.8 → 18mm, 2 → 20mm, 2.5 → 25mm
  if (v > 0 && v < 5) return Math.round(v * 10);
  // Wartość w mm (sensowny zakres 5–50)
  if (v >= 5 && v <= 50) return v;
  // Podejrzanie duże (np. 120 zamiast 12) — podziel przez 10
  if (v > 50) return Math.round(v / 10);
  return DOMYSLNA_GLEBOKOS;
}

    if(!token) return {error:"Brak tokenu dla konta "+kontoId+". Zaloguj się w Admin → Allegro."};
    const url=AUTORESPONDER_URL+"/api/order/checkout-forms/"+orderId.trim();

      const ok=await allegroRefresh(kontoId);
      if(!ok) return {error:"Sesja wygasła — zaloguj się ponownie w Admin → Allegro."};
      token=allegroTokens[kontoId]||"";
      r=await fetch(url,{headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.allegro.public.v1+json"}});

    const invAddr=inv.address||{};
    const buyer=d.buyer||{};

  function importHistCSV(year,text){
    const lines=text.trim().split(/\r?\n/);
    const header=lines[0].split(";").map(h=>h.trim().toLowerCase());
    const idx=(n)=>header.findIndex(h=>h.includes(n));
    const iNr=idx("nr"),iFirma=idx("firma"),iData=idx("data"),iKlient=Math.max(idx("klient"),idx("imię")),iMiasto=idx("miasto"),iTel=idx("tel"),iSzer=idx("szer"),iWys=idx("wys"),iGl=idx("głęb"),iKR=idx("ramki"),iKS=idx("siatki"),iBl=idx("blaszka"),iIl=idx("ilość");
    const grouped={};
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(";");
      if(cols.length<5||!cols[iSzer]) continue;
      const nr=cols[iNr]||("IMP-"+i);
      if(!grouped[nr]) grouped[nr]={id:Date.now()+i,numerZlecenia:nr,firma:cols[iFirma]||"F",data:cols[iData]||"",klientImie:cols[iKlient]||"",klientMiasto:cols[iMiasto]||"",telefon:cols[iTel]||"",uwagi:"",pozycje:[]};
      grouped[nr].pozycje.push({szerokosc:cols[iSzer]||"",wysokosc:cols[iWys]||"",glebokosc:cols[iGl]||"",kolorRamki:cols[iKR]||"",kolorSiatki:cols[iKS]||"",blaszRozmiar:cols[iBl]||"",ilosc:parseInt(cols[iIl])||1});
    }
    const arr=Object.values(grouped);
    const updated={...histOrders,[year]:arr};
    setHistOrders(updated);
    localStorage.setItem("hist_orders",JSON.stringify(updated));
    alert("Wgrano "+arr.length+" zamówień do roku "+year);
  }

  // ── Parsowanie wymiarów z nazwy oferty Allegro ──
  function parseDimsFromOfferName(offerName){
    const name=offerName||"";
    const dimMatch=name.match(/(\d{2,3}[,.]?\d*)\s*[xX\u00d7\u0445]\s*(\d{2,3}[,.]?\d*)/);
    if(!dimMatch) return null;
    let s=parseFloat(dimMatch[1].replace(",",".")),
        w=parseFloat(dimMatch[2].replace(",","."));
    if(s>w&&w>0){const tmp=s;s=w;w=tmp;}
    const KOLORY_RAMKI=[["bia\u0142","Bia\u0142y"],["antracyt","Antracyt"],["br\u0105z","Br\u0105z"],["czar","Czarny"],["winchester","Winchester"],["orzech","Orzech"],["turner","Turner Oak"],["z\u0142ot d\u0105b","Z\u0142oty D\u0105b"],["ciemny","Ciemny D\u0105b"],["d\u0105b","Z\u0142oty D\u0105b"]];
    const KOLORY_SIATKI=[["czar","Czarna"],["szar","Szara"],["bia\u0142","Bia\u0142a"],["antracyt","Antracyt"]];
    let kolorRamki="Antracyt", kolorSiatki="Czarna";
    const lower=name.toLowerCase();
    for(const [pat,val] of KOLORY_RAMKI){ if(lower.includes(pat)){kolorRamki=val;break;} }
    // kolor siatki = drugie wystąpienie koloru
    const parts=lower.split(/\d+\s*[xX\u00d7]\s*\d+/);
    const afterDims=parts[1]||"";
    for(const [pat,val] of KOLORY_SIATKI){ if(afterDims.includes(pat)){kolorSiatki=val;break;} }
    return {szerokosc:String(s),wysokosc:String(w),glebokosc:String(DOMYSLNA_GLEBOKOS),kolorRamki,kolorSiatki,ilosc:1};
  }

  // Mapowanie nazw RAL z kalkulatora do krótkich nazw w MosquitoApp
  function mapKolorProfilu(raw){
    if(!raw) return "Antracyt";
    const r=raw.toLowerCase();
    if(r.includes("bia")) return "Biały";
    if(r.includes("antracyt")) return "Antracyt";
    if(r.includes("br") && r.includes("z")) return "Brąz";
    if(r.includes("czar")) return "Czarny";
    if(r.includes("d") && (r.includes("b")||r.includes("dąb")||r.includes("dab"))) return "Dąb";
    if(r.includes("srebrn")) return "Srebrna";
    if(r.includes("zlot")||r.includes("złot")) return "Złota";
    if(r.includes("szar")) return "Szara";
    // fallback: pierwsze słowo
    return raw.split(" ")[0]||"Antracyt";
  }
  function mapKolorSiatki(raw){
    if(!raw) return "Czarna";
    const r=raw.toLowerCase();
    if(r.includes("szar")) return "Szara";
    return "Czarna";
  }

        }):({

        })):f.pozycje
      }));
    } catch(e){
      console.error("Błąd parsowania AI:", e);
      let msg = e.message || String(e);
      if(msg === "Failed to fetch") {
        msg = "Failed to fetch — sprawdź:\n1. Czy klucz API Claude jest wpisany w Ustawieniach?\n2. Czy Worker allegro-autoresponder.favour-biuro.workers.dev działa?\n3. Czy masz połączenie z internetem?";

  function getStats(ords){

      const il=parseFloat(p.ilosc)||1;
      totalMosk+=il;
      totalLinka+=obliczJedn(p.szerokosc,p.wysokosc,il);
      totalBlaszki+=8*il;

      const k=p.kolorRamki||"Inne"; kolorCount[k]=(kolorCount[k]||0)+il;
    }));
    return {totalMosk,totalLinka:Math.round(totalLinka*10)/10,totalBlaszki,totalM2:Math.round(totalM2*100)/100,kolorCount};

  async function allegroRefresh(kontaId){
    const clientId=localStorage.getItem('allegro_client_id')||'';
    const secret=localStorage.getItem('allegro_client_secret')||'';
    const refreshes=JSON.parse(localStorage.getItem('allegro_refreshes')||'{}');
    const rt=refreshes[kontaId];
    if(!rt||!clientId||!secret) return false;
    try{
      const r=await fetch(AUTORESPONDER_URL+'/refresh?refresh_token='+encodeURIComponent(rt),{
        method:'POST',
        headers:{'Authorization':'Basic '+btoa(clientId+':'+secret)}
      });
      const d=await r.json();
      if(d.access_token){
        const tokens=JSON.parse(localStorage.getItem('allegro_tokens')||'{}');
        tokens[kontaId]=d.access_token;
        if(d.refresh_token) refreshes[kontaId]=d.refresh_token;
        localStorage.setItem('allegro_tokens',JSON.stringify(tokens));
        localStorage.setItem('allegro_refreshes',JSON.stringify(refreshes));
        setAllegroTokens({...tokens});
        // Auto-sync do workera po refresh (z refresh tokenami)
        const allRefreshes2=JSON.parse(localStorage.getItem('allegro_refreshes')||'{}');
        const workerToks2={};
        Object.keys(tokens).forEach(function(k){if(tokens[k]) workerToks2[k]={access:tokens[k],refresh:allRefreshes2[k]||''};});
        fetch(AUTORESPONDER_URL+'/sync',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AUTORESPONDER_KEY},body:JSON.stringify({tokens:workerToks2})}).catch(()=>{});
        return true;
      }
    }catch(e){}
    return false;
  }

        {/* ══ PRODUKCJA ══ */}
        {tab==="produkcja" && (()=>{
          const RAL_KOLORY = ["Biały","Brąz","Antracyt","Czarny"];
          const STRUKTURA_KOLORY = ["Złoty Dąb","Ciemny Dąb","Turner Oak","Orzech","Winchester","Mahoń"];

          // Filter orders by firm
          const filteredOrders = orders.filter(o => {
            if(o.firma && o.firma!==currentProfile.id) return false;
            if(prodFirma!=="all" && o.firma!==prodFirma) return false;
            if(prodDataOd && o.data < prodDataOd) return false;
            if(prodDataDo && o.data > prodDataDo) return false;
            return true;
          });

          // Aggregate production data
          let profilRAL = 0, profilStruktura = 0;
          let siatkaCzarna100=0, siatkaCzarna140=0, siatkaCzarna160=0;
          let siatkaSzara100=0, siatkaSzara140=0, siatkaSzara160=0;
          let narozniki=0, uszczelka=0, blaszki=0, blachowkret=0;
          let radełko=0, instrukcja=0, karton=0;
          let poprzeczki=0, laczniki=0;

          filteredOrders.forEach(o=>{
            const pozOkno = (o.pozycje||[]).filter(p=>!p.isDrzwi);
            let totalSztOk = 0;
            pozOkno.forEach(p=>{
              const szer = parseFloat(p.szerokosc)||0;
              const wys = parseFloat(p.wysokosc)||0;
              const il = parseInt(p.ilosc)||1;
              const kR = p.kolorRamki||"";
              const kS = p.kolorSiatki||"Czarna";
              if(!szer||!wys) return;

              // Profil mb
              const profilCm = ((szer-3.4)*2 + (wys-3.4)*2) * prodOdpadProfil;
              const profilMb = profilCm/100 * il;
              if(RAL_KOLORY.some(k=>kR.includes(k))) profilRAL += profilMb;
              else profilStruktura += profilMb;

              // Siatka
              const krotszy = Math.min(szer, wys);
              const dluzszy = Math.max(szer, wys);
              const siatkaDl = (dluzszy + 20)/100 * il; // mb
              if(krotszy <= 90){
                if(kS==="Szara") siatkaSzara100+=siatkaDl; else siatkaCzarna100+=siatkaDl;
              } else if(krotszy <= 130){
                if(kS==="Szara") siatkaSzara140+=siatkaDl; else siatkaCzarna140+=siatkaDl;
              } else {
                if(kS==="Szara") siatkaSzara160+=siatkaDl; else siatkaCzarna160+=siatkaDl;
              }

              // Narożniki 5 szt/szt
              narozniki += 5*il;

              // Uszczelka mb (obwód)
              const uszMb = ((szer+wys)*2)/100 * il;
              uszczelka += uszMb;

              // Blaszki i blachowkręty
              const bl = parseInt(p.blaszRozmiar)||0;
              const blIl = parseInt(p.blaszIlosc)||(bl?8:0);
              blaszki += blIl*il;
              blachowkret += blIl*il;

              // Poprzeczka gdy max>=170
              if(Math.max(szer,wys)>=170){
                const popDl = (krotszy-3.4)/100 * il;
                poprzeczki += popDl;
                laczniki += 2*il;
              }

              totalSztOk += il;
            });

            if(totalSztOk>0){
              radełko += 1;
              instrukcja += 1;
              karton += Math.ceil(totalSztOk/5);
            }
          });

          // Drzwi
          let drzwiProfilMb=0,drzwiNarozniki=0,drzwiPoprzeczki=0,drzwiUchwyty=0,drzwiZawiasy=0,drzwiSamodomykajace=0,drzwiMagnesy=0,drzwiKlamki=0,drzwiUszczelka=0,drzwiSzczotka=0,drzwiKartony=0,drzwiRadelka=0,drzwiInstrukcje=0,drzwiWkrety=0;
          filteredOrders.forEach(o=>{
            const pD=obliczDrzwi((o.pozycje||[]).filter(p=>p.isDrzwi));
            drzwiProfilMb+=pD.profilMb; drzwiNarozniki+=pD.narozniki; drzwiPoprzeczki+=pD.poprzeczki;
            drzwiUchwyty+=pD.uchwyty; drzwiZawiasy+=pD.zawiasy; drzwiMagnesy+=pD.magnesy;
            drzwiKlamki+=pD.klamki; drzwiUszczelka+=pD.uszczelkaMb; drzwiSzczotka+=pD.szczotkaMb;
            drzwiSamodomykajace+=pD.samodomykajace; drzwiKartony+=pD.kartony; drzwiRadelka+=pD.radelka; drzwiInstrukcje+=pD.instrukcje; drzwiWkrety+=pD.wkrety;
          });

          const r2 = v=>Math.round(v*100)/100;

          return (
            <div style={{maxWidth:900}}>
              {/* Filters & settings */}
              <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                <div>
                  <span className="lbl">Firma</span>
                  <select value={prodFirma} onChange={e=>setProdFirma(e.target.value)}>
                    <option value="all">Wszystkie</option>
                    {FIRMY.map(f=><option key={f.kod} value={f.kod}>{f.nazwa}</option>)}
                  </select>
                </div>
                <div>
                  <span className="lbl">Odpad profil</span>
                  <input type="number" value={prodOdpadProfil} onChange={e=>setProdOdpadProfil(parseFloat(e.target.value)||1.1)} step="0.01" style={{width:70}}/>
                </div>
                <div>
                  <span className="lbl">Odpad siatka</span>
                  <input type="number" value={prodOdpadSiatka} onChange={e=>setProdOdpadSiatka(parseFloat(e.target.value)||1.1)} step="0.01" style={{width:70}}/>
                </div>
                <div>
                  <span className="lbl">Od</span>
                  <input type="date" value={prodDataOd} onChange={e=>setProdDataOd(e.target.value)} style={{width:130}}/>
                </div>
                <div>
                  <span className="lbl">Do</span>
                  <input type="date" value={prodDataDo} onChange={e=>setProdDataDo(e.target.value)} style={{width:130}}/>
                </div>
                <button className="btn-sm" onClick={()=>{
                  const now=new Date();
                  const mon=new Date(now.getFullYear(),now.getMonth(),1);
                  setProdDataOd(mon.toISOString().slice(0,10));
                  setProdDataDo(now.toISOString().slice(0,10));
                }}>Ten miesiąc</button>
                <button className="btn-sm" onClick={()=>{
                  const now=new Date();
                  const day=now.getDay()||7;
                  const mon=new Date(now); mon.setDate(now.getDate()-day+1);
                  setProdDataOd(mon.toISOString().slice(0,10));
                  setProdDataDo(now.toISOString().slice(0,10));
                }}>Ten tydzień</button>
                <button className="btn-sm" onClick={()=>{setProdDataOd("");setProdDataDo("");}}>Wszystkie</button>
                <span style={{fontSize:11,color:"#4a8a4a",marginLeft:"auto"}}>
                  {filteredOrders.length} zamówień
                </span>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                {/* Profil */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#afffaf",marginBottom:12}}>🔩 Profil aluminiowy</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      <tr><td style={{color:"#5a8a5a",paddingBottom:6}}>RAL (Biały/Brąz/Antracyt/Czarny)</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{r2(profilRAL)} mb</td></tr>
                      <tr><td style={{color:"#5a8a5a"}}>Struktura drewna</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{r2(profilStruktura)} mb</td></tr>
                      <tr style={{borderTop:"1px solid #1e3a1e"}}><td style={{color:"#afffaf",paddingTop:8,fontWeight:700}}>RAZEM</td><td style={{textAlign:"right",color:"#afffaf",fontWeight:700,paddingTop:8}}>{r2(profilRAL+profilStruktura)} mb</td></tr>
                    </tbody>
                  </table>
                </div>

                {/* Siatka */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#afffaf",marginBottom:12}}>🕸️ Siatka</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Czarna 100cm",siatkaCzarna100],["Czarna 140cm",siatkaCzarna140],["Czarna 160cm",siatkaCzarna160],["Szara 100cm",siatkaSzara100],["Szara 140cm",siatkaSzara140],["Szara 160cm",siatkaSzara160]].map(([l,v])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:4}}>{l}</td><td style={{textAlign:"right",color:v>0?"#9fcf9f":"#2a4a2a",fontWeight:700}}>{r2(v)} mb</td></tr>
                      ))}
                      <tr style={{borderTop:"1px solid #1e3a1e"}}><td style={{color:"#afffaf",paddingTop:8,fontWeight:700}}>RAZEM</td><td style={{textAlign:"right",color:"#afffaf",fontWeight:700,paddingTop:8}}>{r2(siatkaCzarna100+siatkaCzarna140+siatkaCzarna160+siatkaSzara100+siatkaSzara140+siatkaSzara160)} mb</td></tr>
                    </tbody>
                  </table>
                </div>

                {/* Akcesoria */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#afffaf",marginBottom:12}}>🔧 Akcesoria</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Narożniki",narozniki,"szt"],["Uszczelka",r2(uszczelka),"mb"],["Blaszki",blaszki,"szt"],["Blachowkręty",blachowkret,"szt"],["Poprzeczki",r2(poprzeczki),"mb"],["Łączniki poprzeczek",laczniki,"szt"]].map(([l,v,u])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:6}}>{l}</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{v} {u}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Opakowanie */}
                <div className="card">
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#afffaf",marginBottom:12}}>📦 Opakowanie & narzędzia</div>
                  <table style={{width:"100%",fontSize:13}}>
                    <tbody>
                      {[["Karton",karton,"szt"],["Instrukcja",instrukcja,"szt"],["Radełko",radełko,"szt"]].map(([l,v,u])=>(
                        <tr key={l}><td style={{color:"#5a8a5a",paddingBottom:6}}>{l}</td><td style={{textAlign:"right",color:"#9fcf9f",fontWeight:700}}>{v} {u}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Drzwi */}
              {drzwiKartony>0&&(
                <div className="card" style={{gridColumn:"1/-1"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#90b8df",marginBottom:12}}>🚪 Drzwi moskitierowe</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                    {[["Profil",r2(drzwiProfilMb),"mb"],["Uszczelka",r2(drzwiUszczelka),"mb"],["Szczotka",r2(drzwiSzczotka),"mb"],["Narożniki",drzwiNarozniki,"szt"],["Poprzeczki",drzwiPoprzeczki,"szt"],["Uchwyty poprz.",drzwiUchwyty,"szt"],["Zawiasy",drzwiZawiasy,"szt"],["Magnesy",drzwiMagnesy,"szt"],["Klamki",drzwiKlamki,"szt"],["Samodomykające",drzwiSamodomykajace,"szt"],["Kartony",drzwiKartony,"szt"],["Radełka",drzwiRadelka,"szt"],["Wkręty",drzwiWkrety,"szt"]].map(([l,v,u])=>(
                      <div key={l} style={{background:"#0c1428",border:"1px solid #1e2a4e",borderRadius:6,padding:"8px 12px"}}>
                        <div style={{fontSize:16,fontWeight:900,color:"#90b8df"}}>{v}</div>
                        <div style={{fontSize:10,color:"#4a6a9a"}}>{u}</div>
                        <div style={{fontSize:10,color:"#3a5a8a",letterSpacing:".05em"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}
        {/* ══ USTAWIENIA ══ */}
        {tab==="ustawienia" && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* ── AUTORESPONDER ── */}
            <div className="card" style={{maxWidth:600}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#afffaf",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                🤖 Autoresponder
                <button onClick={fetchAutoStatus} disabled={autoStatusLoading} style={{marginLeft:"auto",padding:"4px 12px",fontSize:11,background:"#1a2a1a",border:"1px solid #2a4a2a",borderRadius:5,color:"#5a9a5a",cursor:"pointer"}}>
                  {autoStatusLoading?"⟳ ładuję...":"🔄 Odśwież status"}
                </button>
              </div>

              {/* Status */}
              {autoStatus&&(
                <div style={{background:"#0a180a",border:"1px solid #1e3a1e",borderRadius:6,padding:"10px 14px",marginBottom:14,fontSize:12}}>
                  {autoStatus.error?(
                    <span style={{color:"#df8080"}}>❌ {autoStatus.error}</span>
                  ):(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div><span style={{color:"#6aaa6a"}}>Ostatnie uruchomienie:</span><br/><span style={{color:"#9fcf9f",fontWeight:700}}>{autoStatus.lastRun?new Date(autoStatus.lastRun).toLocaleString("pl-PL"):"—"}</span></div>
                      <div><span style={{color:"#6aaa6a"}}>Obsłużone wątki:</span><br/><span style={{color:"#9fcf9f",fontWeight:700}}>{autoStatus.sentCount||0}</span></div>
                      <div><span style={{color:"#6aaa6a"}}>Konta:</span><br/><span style={{color:"#9fcf9f",fontWeight:700}}>{(autoStatus.accounts||[]).join(", ")||"—"}</span></div>
                      <div><span style={{color:"#6aaa6a"}}>Status:</span><br/><span style={{color:(autoStatus.accounts||[]).length>0?"#7fcf7f":"#df8080",fontWeight:700}}>{(autoStatus.accounts||[]).length>0?"✅ Aktywny":"⚠️ Brak tokenów"}</span></div>
                    </div>
                  )}
                </div>
              )}

              {/* Sync tokens */}
              <div style={{marginBottom:14}}>
                <button onClick={syncAutoresponderTokens} disabled={autoSyncing} className="btn" style={{width:"100%"}}>
                  {autoSyncing?"⟳ Synchronizuję...":"🔑 Synchronizuj tokeny do autorespondera"}
                </button>
                {autoSyncResult&&<div style={{marginTop:8,fontSize:12,color:autoSyncResult.startsWith("✅")?"#7fcf7f":"#df8080",padding:"6px 10px",background:"#0a180a",borderRadius:4}}>{autoSyncResult}</div>}
              </div>

              {/* Quick reply text */}
              <div style={{marginBottom:14}}>
                <span className="lbl" style={{marginBottom:6}}>Treść szybkiej odpowiedzi</span>
                <textarea value={autoQuickText} onChange={e=>setAutoQuickText(e.target.value)} rows={4}
                  style={{width:"100%",background:"#0e1a0e",border:"1px solid #2a4a2a",borderRadius:5,color:"#c0e0c0",padding:"8px 10px",fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
                <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
                  <button onClick={saveAutoQuickText} disabled={autoSavingText} className="btn">
                    {autoSavingText?"⟳ Zapisuję...":"💾 Zapisz i wyślij do Workera"}
                  </button>
                  {autoTextSaved&&<span style={{color:"#afffaf",fontSize:12}}>✓ Zapisano!</span>}
                </div>
              </div>

              {/* Reset history */}
              <div style={{borderTop:"1px solid #1e2a1e",paddingTop:12}}>
                <button onClick={resetAutoHistory} disabled={autoResetting}
                  style={{padding:"6px 16px",fontSize:12,background:"#2a0a0a",border:"1px solid #5a2a2a",borderRadius:5,color:"#cf8080",cursor:"pointer"}}>
                  {autoResetting?"⟳ Resetuję...":"🗑 Reset historii (wyślij ponownie do wszystkich)"}
                </button>
                <div style={{fontSize:10,color:"#4a3a3a",marginTop:4}}>Uwaga: autoresponder wyśle wiadomość do każdego wątku po następnym uruchomieniu (co 5 min)</div>
              </div>
            </div>

            {/* ── INSTRUKCJA AI ── */}
            <div className="card" style={{maxWidth:600}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#afffaf",marginBottom:14}}>🤖 Instrukcja AI (sugeruj odpowiedź)</div>
              <span className="lbl" style={{marginBottom:6}}>Instrukcja systemowa dla przycisku "Sugeruj" w Wiadomościach</span>
              <textarea value={aiInstruction} onChange={e=>setAiInstruction(e.target.value)}
                placeholder={"Jesteś pomocnym asystentem sklepu sprzedającego moskitiery..."}
                rows={5} style={{width:"100%",background:"#0e1a0e",border:"1px solid #2a4a2a",borderRadius:5,color:"#c0e0c0",padding:"8px 10px",fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
                <button onClick={()=>{localStorage.setItem("ai_msg_instruction",aiInstruction);setAiInstrSaved(true);setTimeout(()=>setAiInstrSaved(false),2000);}} className="btn">
                  💾 Zapisz instrukcję
                </button>
                {aiInstrSaved&&<span style={{color:"#afffaf",fontSize:12}}>✓ Zapisano!</span>}
              </div>
            </div>

            {/* ── JSONBIN ── */}
            <div className="card" style={{maxWidth:520}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:"#afffaf",marginBottom:14}}>☁ Synchronizacja JSONBin</div>
              <div style={{marginBottom:14}}>
                <span className="lbl">Master Key</span>
                <input value={settings.apiKey||""} onChange={e=>setSettings(s=>({...s,apiKey:e.target.value}))} placeholder="$2b$10$..." style={{fontFamily:"monospace",fontSize:12}}/>
                <span className="lbl" style={{marginTop:12}}>Klucz API Claude (AI parsowanie)</span>
                <input value={claudeKey} onChange={e=>{setClaudeKey(e.target.value);localStorage.setItem("claude_api_key",e.target.value);}} placeholder="sk-ant-..." style={{fontFamily:"monospace",fontSize:12}}/>
              </div>
              <div style={{marginBottom:14}}>
                <span className="lbl">Bin ID</span>
                <input value={settings.binId||""} onChange={e=>setSettings(s=>({...s,binId:e.target.value}))} placeholder="64f3a1b2c8a3e12345678901" style={{fontFamily:"monospace",fontSize:12}}/>
              </div>
              <button className="btn" onClick={()=>{window.jsonbinSettings.saveSettings(settings);setSettingsSaved(true);setTimeout(()=>setSettingsSaved(false),2000);}}>
                💾 Zapisz
              </button>
              {settingsSaved&&<span style={{marginLeft:12,color:"#afffaf",fontSize:12}}>✓ Zapisano!</span>}
              <div style={{marginTop:14,padding:"8px 12px",background:settings.apiKey&&settings.binId?"#0c180c":"#1a1000",border:`1px solid ${settings.apiKey&&settings.binId?"#1a3a1a":"#3a2a00"}`,borderRadius:4,fontSize:12,color:settings.apiKey&&settings.binId?"#5a9a5a":"#8a7a3a"}}>
                {settings.apiKey&&settings.binId?"✅ Synchronizacja aktywna":"⚠️ Brak konfiguracji — dane lokalne"}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(React.StrictMode,null,React.createElement(App)));
</script>
</body></html>
