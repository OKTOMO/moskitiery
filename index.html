const WORKER_URL = 'https://allegro-autoresponder.favour-biuro.workers.dev';

function getWorkerKey() {
  return localStorage.getItem('mosk_worker_key') || '';
}

// Zachowaj kompatybilnosc z JSONBin dla migracji
const SETTINGS_KEY = 'mosk_jsonbin_settings';
function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
window.jsonbinSettings = { getSettings, saveSettings };

window.storage = {
  async get(key) {
    const workerKey = getWorkerKey();
    if (!workerKey) {
      // Fallback: JSONBin
      const { apiKey, binId } = getSettings();
      if (!apiKey || !binId) return null;
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers: { 'X-Master-Key': apiKey } });
        const data = await res.json();
        let record = data.record;
        if (Array.isArray(record)) return { key, value: JSON.stringify(record) };
        if (record && Array.isArray(record.orders)) return { key, value: JSON.stringify(record.orders) };
        return { key, value: '[]' };
      } catch { return null; }
    }
    try {
      const res = await fetch(WORKER_URL + '/mosk/orders', { headers: { 'x-api-key': workerKey } });
      const data = await res.json();
      return { key, value: JSON.stringify(data.orders || []) };
    } catch(e) { console.error('KV get error:', e); return null; }
  },

  async set(key, value) {
    const workerKey = getWorkerKey();
    if (!workerKey) {
      // Fallback: JSONBin
      const { apiKey, binId } = getSettings();
      if (!apiKey || !binId) { localStorage.setItem(key, value); return { key, value }; }
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
          body: value
        });
        if (!res.ok) return { key, value, error: 'JSONBin HTTP ' + res.status };
        return { key, value };
      } catch(e) { return { key, value, error: e.message }; }
    }
    try {
      const res = await fetch(WORKER_URL + '/mosk/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': workerKey },
        body: JSON.stringify({ orders: JSON.parse(value) })
      });
      if (!res.ok) return { key, value, error: 'KV HTTP ' + res.status };
      return { key, value };
    } catch(e) {
      console.error('KV set error:', e);
      return { key, value, error: e.message };
    }
  },

  async delete(key) { return window.storage.set(key, '[]'); },
  async list() { return { keys: ['mosk_orders'] }; }
};

</script>

  if (!tel) return '';
  const digits = String(tel).replace(/[^0-9]/g, '');
  let d = digits;

function normalizujGlebokosc(g) {
  const v = parseFloat(g);
  if (!v || isNaN(v)) return DOMYSLNA_GLEBOKOS;
  // Wartości < 5 traktuj jako cm (1.0–4.9 cm → 10–49 mm)
  // np. 1.8 → 18mm, 2 → 20mm, 2.5 → 25mm
  if (v > 0 && v < 5) return Math.round(v * 10);
  // Wartość w mm (sensowny zakres 5–50)
  if (v >= 5 && v <= 50) return v;
  // Podejrzanie duże (np. 120 zamiast 12) — podziel przez 10
  if (v > 50) return Math.round(v / 10);
  return DOMYSLNA_GLEBOKOS;
}

ROZPOZNAWANIE TYPU:
- isDrzwi=true gdy klient pisze: "drzwi", "drzwiowe", "moskitiera drzwiowa", "balkonowe drzwi" itp.
- isDrzwi=false gdy mowa o oknie, rolecie, moskitierze okiennej (domyślnie)

DLA OKIEN (isDrzwi:false):
- szerokosc = szerokość otworu w cm
- wysokosc = wysokość otworu w cm
- glebokosc = głębokość wnęki/felca w mm — BARDZO WAŻNE ZASADY:

  * WAŻNE: Format "Okno 1: 226,3cm x 84cm x 2cm" oznacza szerokość x wysokość x głębokość — NIE ilość! Trzecia liczba to zawsze głębokość felca (przelicz na mm: 2cm=20mm), ilosc=1 dla każdego okna.

  * UWAGA: liczby 10–35 to mm, liczby 1–3,5 to cm (przelicz ×10). Liczba >35 to prawie na pewno cm — przelicz ÷10 i zaokrąglij do mm.

DLA DRZWI (isDrzwi:true):

Jak rozpoznać 4 wymiary jednych drzwi:
- klient pisze np. "98,5 i 102,5 cm szerokość, 216,5 i 220,5 cm wysokość" → JEDNA pozycja
- klient pisze "98,5/102,5 x 216,5/220,5" → JEDNA pozycja
- klient oznacza wymiary literami A,B,C,D — ZAWSZE chodzi o JEDNE drzwi

Gdy klient podaje 4 wymiary oznaczone literami A,B,C,D, użyj TYLKO A i B jako wymiarów drzwi:
A = szerokość, B = wysokość.
C i D to wymiary POMOCNICZE (np. do sprawdzenia kolizji przy montażu) — NIE wchodzą do pól szerokosc/wysokosc/szer2/wys2. Zamiast tego wpisz je do pola uwagi w formacie: "C: {wartość C}cm, D: {wartość D}cm".
NIE sortuj wartości po wielkości, NIE traktuj C/D jako drugiego pomiaru tej samej szerokości/wysokości.
Przykład: "A-103cm, B-215,5cm, C-113cm, D-225cm" → szerokosc=103, wysokosc=215.5, uwagi="C: 113cm, D: 225cm"
Przykład: "A – 99,5 cm, B – 218 cm, C – 109 cm, D – 231 cm" → szerokosc=99.5, wysokosc=218, uwagi="C: 109cm, D: 231cm"

Jeśli klient podaje TYLKO 2 wymiary (bez liter, lub z literami A,B / albo dwie liczby x dwie liczby typu "98,5/102,5 x 216,5/220,5" — czyli dwa pomiary tej samej szerokości i dwa tej samej wysokości), to wtedy stosuj zwykłą logikę szerokosc/szer2, wysokosc/wys2 (mniejsza/większa wartość) jak opisano niżej w sekcji WYMIARY.
Przypisanie wartości dla JEDNEJ pozycji drzwi:
- szerokosc = MNIEJSZA wartość spośród szerokości
- szer2 = WIĘKSZA wartość spośród szerokości (null jeśli podano tylko jedną)
- wysokosc = MNIEJSZA wartość spośród wysokości
- wys2 = WIĘKSZA wartość spośród wysokości (null jeśli podano tylko jedną)

Przykłady parsowania:
"A=214cm, B=81,5cm, D=92cm" (A=wys, B=szer min, D=szer max) → szerokosc=81.5, szer2=92, wysokosc=214, wys2=null
"98,5/102,5 x 216,5/220,5" → szerokosc=98.5, szer2=102.5, wysokosc=216.5, wys2=220.5
"szerokość 80cm i 84cm, wysokość 210cm" → szerokosc=80, szer2=84, wysokosc=210, wys2=null

Dwie OSOBNE pozycje drzwi tylko gdy klient wyraźnie opisuje DWA różne otwory/miejsca montażu z RÓŻNYMI wymiarami.
UWAGA: jeśli klient podaje "2 sztuki" lub "2 szt" przy jednym zestawie wymiarów (nawet 4 liczbach) → to JEDNA pozycja z ilosc=2, NIE dwie osobne pozycje.
Przykład: "2 szt, 98,5/102,5 x 216/220" → jedna pozycja: szerokosc=98.5, szer2=102.5, wysokosc=216, wys2=220, ilosc=2

UWAGA: jeśli klient podaje NUMEROWANĄ LISTĘ pozycji (np. "1. 59×62 ... 2. 59×62 ... 3. 59×63"), każdy wiersz to OSOBNA pozycja — NIE scalaj identycznych wymiarów w jedną z większą ilością. Każda linia listy = jedna pozycja z ilosc=1 (lub ilosc podaną w tej linii).

Pozostałe pola:
- glebokosc = null
- zawias = "L" lub "P" — jeśli nie podano = "L"
- poprzeczka = true/false — jeśli nie podano = false
- WAŻNE: jeśli tytuł oferty lub wiadomość zawiera "bez poprzeczki" → poprzeczka=false; jeśli zawiera "z poprzeczką" → poprzeczka=true
- ROZPOZNAWANIE Z CENY ZAMÓWIENIA: ceny drzwi jednoznacznie określają poprzeczkę i samodomykacz:
  499 zł → poprzeczka=false, samodomykajacy=0
  539 zł → poprzeczka=false, samodomykajacy=1 (lub 2)
  549 zł → poprzeczka=true, samodomykajacy=0
  589 zł → poprzeczka=true, samodomykajacy=1 (lub 2)
  Jeśli znasz cenę zamówienia, użyj jej do określenia poprzeczki i samodomykacza!
- samodomykajacy = liczba zawiasów samodomykających (0 jeśli nie podano)

Biały, Czarny, Antracyt, Brąz, Złoty Dąb, Winchester, Orzech, Ciemny Dąb, Mahoń, Turner Oak

WAŻNE:
- Identyczne pozycje NIE są scalane — każda linia listy to OSOBNA pozycja z ilosc=1, nawet jeśli wymiary są identyczne. Wyjątek: tylko gdy klient JAWNIE pisze "2 szt" lub "x2" przy danej pozycji.
- klientImie = PEŁNE imię i nazwisko klienta w formacie: Nazwisko Imię (np. "Kowalski Jan"). Jeśli w wiadomości jest tylko jedno słowo — wpisz je. Nigdy nie pomijaj nazwiska jeśli jest podane.
- klientMiasto ZAWSZE wypełnij jeśli występuje w adresie lub treści — także dla drzwi.
- Z adresu wyciągnij: klientUlica (ulica + nr domu), klientKod (XX-XXX), klientMiasto (miejscowość)
- WYMIARY: szerokosc zawsze mniejsza wartość, wysokosc zawsze większa. Np. klient podał "214 x 81,5" → szerokosc=81.5, wysokosc=214. Dotyczy zarówno okien jak i drzwi.
- JEDNOSTKI mm vs cm: wymiary ZAWSZE zwracaj w cm. Jeśli klient podał wartości w mm (np. "780 x 2165 mm" lub liczby >400 bez jednostki), podziel przez 10. Przykład: 780mm → 78cm, 2165mm → 216.5cm. Jeśli wartość bez jednostki jest np. 78 lub 216 — to już cm, nie przeliczaj.
- NOTACJA "2×WARTOŚĆ": klient mierzy dwukrotnie i zapisuje np. "A wysokość 2×216,5" lub "2×78 cm" — oznacza to JEDNĄ wartość 216,5 (lub 78), mierzoną dwa razy. Użyj tej jednej wartości, NIE mnóż przez 2.
- FORMAT "szer.=90, wys.=227,5 (a=83, b=221)" → szerokosc=83, szer2=90, wysokosc=221, wys2=227.5 (wartości w nawiasie to wymiary wewnętrzne/mniejsze)
- WYJĄTEK — gdy klient pisze "Okno 1: A-117,5cmx2, B-80cmx2" i numeruje kolejne okna — każde "Okno X" to OSOBNA pozycja. "A-117,5cmx2" = wysokosc=117.5 (x2 = mierzone dwa razy), "B-80cmx2" = szerokosc=80. Przykład: Okno1 A-117,5x2 B-80x2, Okno2 A-117,5x2 B-80x2, Okno3 A-117,5x2 B-61x2, Okno4 A-117,5x2 B-61x2 → 4 pozycje: {szer:80,wys:117.5}, {szer:80,wys:117.5}, {szer:61,wys:117.5}, {szer:61,wys:117.5} każda ilosc=1.
- "NA GOTOWO" / "NA ZERO" / "WYMIAR ZEWNĘTRZNY" / "nie powiększać" / "bez powiększenia" / "proszę nie powiększać": klient podaje gotowy wymiar zewnętrzny ramy. Zasady:
  * ODEJMIJ dokładnie 4cm od szerokości i 4cm od wysokości — wpisz wynik bezpośrednio do szerokosc i wysokosc
  * Przykład: "85 x 227 na gotowo" → szerokosc=81, wysokosc=223
  * Przykład: "90 x 210 nie powiększać" → szerokosc=86, wysokosc=206
  * Przykład: "wymiary na zero: 77cm/230cm" → szerokosc=73, wysokosc=226
  * Przykład: "wymiar na zero 85cm/200cm" → szerokosc=81, wysokosc=196
  * Format ze slashem "X cm/Y cm" lub dwukropkiem po frazie wyzwalającej TAKŻE wyzwala odjęcie 4cm — nie tylko format "X x Y"
  * NIE wpisuj oryginalnego wymiaru nigdzie — ani do szer2, wys2, ani do uwagi
  * Ustaw isDrzwi:true
  * TYLKO przy tych konkretnych zwrotach — bez nich NIE odejmuj nic
  * WYJĄTEK — gdy klient podaje 4 wymiary (A, B, C, D) z "na gotowo": A i C to szerokości (min i max), B i D to wysokości (min i max). Użyj ich BEZPOŚREDNIO bez odejmowania: szerokosc=min(A,C), szer2=max(A,C), wysokosc=min(B,D), wys2=max(B,D). Przykład: A=78, B=213.5, C=90, D=225 → szerokosc=78, szer2=90, wysokosc=213.5, wys2=225
- ROZPOZNAWANIE DRZWI: ustaw isDrzwi:true TYLKO gdy:
  1. Tytuł oferty zawiera słowo "drzwi" (sprawdź TYTUŁ OFERTY Z ALLEGRO powyżej) — TO JEST NAJWAŻNIEJSZE KRYTERIUM
  2. LUB wiadomość klienta zawiera: "balkon", "taras", "wejście", "na gotowo", "nie powiększać"
  3. NIE ustawiaj isDrzwi tylko dlatego że wysokość >180cm lub >200cm — okna mogą być bardzo wysokie!
- IGNORUJ NOTATKI CENOWE: frazy w nawiasach zawierające słowa "jednostek", "wg kalkulatora", "kalkulator", "jedn." itp. to adnotacje wewnętrzne sprzedawcy — CAŁKOWICIE IGNORUJ zawarte w nich liczby przy parsowaniu ilosc. Przykład: "(Ilosc jednostek wg kalkulatora 45)" → ilosc=1 (lub wg rzeczywistej ilości sztuk z reszty tekstu), NIE 45.

IGNORUJ OBLICZENIA JEDNOSTEK:
Sprzedawca dopisuje kalkulację: "A×2+B×2=wynik/10". To WYLICZENIA ROBOCZE — nie wymiary.
Przykłady: "73,5x2+221,5x2=590/10=59 x3" → szerokosc=73.5, wysokosc=221.5, ilosc=3
"48 jednostek" za wymiarem → ignoruj (NIE sztuki)

NOTACJA X/Y: "120/124" dla okna → szerokosc=120, uwagi="120/124"
CZTERY POMIARY OKNA: "46+46+66+66" → szerokosc=46, wysokosc=66
DWA WYMIARY SZEROKOŚCI OKNA: gdy klient podaje dwie bliskie wartości jako A i B (np. "A 101,5cm, B 104,5cm") → szerokosc=101.5, szer2=104.5 (JEDNA pozycja, nie dwie!). Analogicznie dla wysokości: dwie wartości → wysokosc=mniejsza, wys2=większa.

function obliczDrzwi(pozycje) {
  let profilMb = 0,
    narozniki = 0,
    poprzeczki = 0,
    uchwyty = 0,
    zawiasy = 0,
    samodomykajace = 0,
    magnesy = 0,
    klamki = 0,
    uszczelkaMb = 0,
    szczotkaMb = 0,
    kartony = 0,
    radelka = 0,
    instrukcje = 0,
    wkrety = 0;
  (pozycje || []).filter(p => p.isDrzwi).forEach(p => {
    const s = parseFloat(p.szerokosc) || 0,
      w = parseFloat(p.wysokosc) || 0,
      il = parseInt(p.ilosc) || 1;
    if (!s || !w) return;
    const sP = s + 4,
      wP = w + 4;
    profilMb += (sP * 2 + wP * 2) * 1.10 / 100 * il; // pełny obwód + 10% odpad
    narozniki += 4 * il;
    if (p.poprzeczka) {
      poprzeczki += il;
      uchwyty += 2 * il;
    }
    zawiasy += 2 * il;
    samodomykajace += (parseInt(p.samodomykajacyL) || 0) + (parseInt(p.samodomykajacyP) || 0);
    magnesy += 3 * il;
    klamki += 2 * il;
    uszczelkaMb += (sP * 2 + wP * 2) * 1.1 / 100 * il; // pełny obwód (4 boki) + 10% odpad
    szczotkaMb += (sP * 2 + wP * 2) * 1.1 / 100 * il; // pełny obwód (4 boki) + 10% odpad
    kartony += il;
    radelka += il;
    instrukcje += il;
    wkrety += 12 * il;
  });
  const r = v => Math.round(v * 100) / 100;
  // siatka - jak w oknie, szer zawsze mniejszy wymiar drzwi
  let siatkaCz100 = 0,
    siatkaCz140 = 0,
    siatkaCz160 = 0,
    siatkaSz100 = 0,
    siatkaSz140 = 0,
    siatkaSz160 = 0;
  (pozycje || []).filter(p => p.isDrzwi).forEach(p => {
    const s = parseFloat(p.szerokosc) || 0,
      w = parseFloat(p.wysokosc) || 0,
      il = parseInt(p.ilosc) || 1;
    if (!s || !w) return;
    const dluzszy = Math.max(s, w),
      krotszy = Math.min(s, w);
    const siatkaDl = Math.round((dluzszy + 20) / 100 * il * 100) / 100;
    const kS = p.kolorSiatki || "Czarna";
    if (krotszy <= 90) {
      if (kS === "Szara") siatkaSz100 += siatkaDl;else siatkaCz100 += siatkaDl;
    } else if (krotszy <= 130) {
      if (kS === "Szara") siatkaSz140 += siatkaDl;else siatkaCz140 += siatkaDl;
    } else {
      if (kS === "Szara") siatkaSz160 += siatkaDl;else siatkaCz160 += siatkaDl;
    }
  });
  return {
    profilMb: r(profilMb),
    narozniki,
    poprzeczki,
    uchwyty,
    zawiasy,
    samodomykajace,
    magnesy,
    klamki,
    uszczelkaMb: r(uszczelkaMb),
    szczotkaMb: r(szczotkaMb),
    kartony,
    radelka,
    instrukcje,
    wkrety,
    siatkaCz100: r(siatkaCz100),
    siatkaCz140: r(siatkaCz140),
    siatkaCz160: r(siatkaCz160),
    siatkaSz100: r(siatkaSz100),
    siatkaSz140: r(siatkaSz140),
    siatkaSz160: r(siatkaSz160)
  };
}

// ─── NASTĘPNY DZIEŃ ROBOCZY ───────────────────────────────────────────────────
function swietaPolskie(rok) {
  // Wielkanoc — algorytm Gaussowski
  const a = rok % 19,
    b = Math.floor(rok / 100),
    c = rok % 100;
  const d = Math.floor(b / 4),
    e = b % 4,
    f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3),
    h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4),
    k = c % 4,
    l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const miesiac = Math.floor((h + l - 7 * m + 114) / 31);
  const dzien = (h + l - 7 * m + 114) % 31 + 1;
  const wiel = new Date(rok, miesiac - 1, dzien); // Niedziela Wielkanocna
  const fmt = d => d.toISOString().slice(0, 10);
  const add = (d, n) => {
    const x = new Date(d);
    x.setDate(x.getDate() + n);
    return x;
  };
  return new Set([`${rok}-01-01`,
  // Nowy Rok
  `${rok}-01-06`,
  // Trzech Króli
  fmt(wiel),
  // Wielkanoc
  fmt(add(wiel, 1)),
  // Poniedziałek Wielkanocny
  `${rok}-05-01`,
  // Święto Pracy
  `${rok}-05-03`,
  // Konstytucja 3 Maja
  fmt(add(wiel, 49)),
  // Zesłanie Ducha Świętego
  fmt(add(wiel, 60)),
  // Boże Ciało
  `${rok}-08-15`,
  // Wniebowzięcie NMP
  `${rok}-11-01`,
  // Wszystkich Świętych
  `${rok}-11-11`,
  // Niepodległości
  `${rok}-12-25`,
  // Boże Narodzenie
  `${rok}-12-26` // Drugi dzień BN
  ]);
}
function nastepnyDzienRoboczy(od = new Date()) {
  const d = new Date(od);
  d.setDate(d.getDate() + 1); // zawsze minimum jutro
  for (let i = 0; i < 14; i++) {
    const iso = d.toISOString().slice(0, 10);
    const dow = d.getDay(); // 0=niedz, 6=sob
    const swieta = swietaPolskie(d.getFullYear());
    if (dow !== 0 && dow !== 6 && !swieta.has(iso)) return iso;
    d.setDate(d.getDate() + 1);
  }
  return d.toISOString().slice(0, 10); // fallback
}

      iIl = idx("ilość");

      const cols = lines[i].split(";");

      const nr = cols[iNr] || "IMP-" + i;
      if (!grouped[nr]) grouped[nr] = {
        id: Date.now() + i,
        numerZlecenia: nr,
        firma: cols[iFirma] || "F",
        data: cols[iData] || "",

  // ── POBIERZ ZAMÓWIENIA Z ALLEGRO (przez autoresponder worker) ──
  async function fetchAllegroOrders() {
    setAllegroImportLoading(true);
    setAllegroImportError("");
    setAllegroImportResults([]);
    try {
      const r = await fetch(AUTORESPONDER_URL + "/orders", {
        headers: {
          "x-api-key": AUTORESPONDER_KEY
        }
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error("HTTP " + r.status + ": " + txt.slice(0, 200));
      }
      const d = await r.json();
      if (!d.ok) throw new Error(JSON.stringify(d));
      const rawOrders = d.orders || [];
      // Zaznacz które już są w bazie
      const allResults = rawOrders.map(imp => ({
        ...imp,
        alreadyExists: orders.some(o => o.allegroOrderId === imp.allegroOrderId)
      }));
      // Sortuj: nowe pierwsze
      allResults.sort((a, b) => {
        if (a.boughtAt && b.boughtAt) return new Date(b.boughtAt) - new Date(a.boughtAt);
        return new Date(b.data) - new Date(a.data);
      });
      setAllegroImportResults(allResults);
      try {
        localStorage.setItem('allegro_import_results', JSON.stringify(allResults));
      } catch (e) {
        console.warn('localStorage full:', e);
      }
      setAllegroImportShow(true);
      // Auto-pobierz porzucone po załadowaniu zamówień
      fetchLeads().catch(function () {});
      // Auto-sync faktur z Fakturowni (co 10 minut max)
      const _lastSync = parseInt(localStorage.getItem('fakturownia_last_sync') || '0');
      if (Date.now() - _lastSync > 10 * 60 * 1000) {
        const _cfg = JSON.parse(localStorage.getItem('fakturownia_config') || '{}');
        if (_cfg.token && _cfg.domain) {
          localStorage.setItem('fakturownia_last_sync', String(Date.now()));
          fetch(AUTORESPONDER_URL + '/fakturownia/invoices?token=' + encodeURIComponent(_cfg.token) + '&domain=' + encodeURIComponent(_cfg.domain) + '&period=this_month&per_page=100&page=1', {
            headers: {
              'x-api-key': AUTORESPONDER_KEY
            }
          }).then(function (r) {
            return r.json();
          }).then(function (rd) {
            if (!rd.ok) return;
            const invList = rd.invoices || [];
            setInvoicesSent(function (prev) {
              const next = {
                ...prev
              };
              (invList || []).forEach(function (inv) {
                const exists = Object.values(next).some(function (v) {
                  return v.id === inv.id || v.fakturowniaId === String(inv.id);
                });
                if (!exists) {
                  const nip = (inv.buyer_tax_no || '').replace(/[^0-9]/g, '');
                  const kwota = parseFloat(inv.gross_price || inv.price_gross || 0);
                  const invName = (inv.buyer_name || '').toLowerCase();
                  // Dopasuj po NIP lub nazwie+kwocie
                  const matchedImp = allResults.find(function (i) {
                    if (nip && (i.nip || '').replace(/[^0-9]/g, '') === nip) return true;
                    const impName = (i.nabywcaNazwa || i.klientImie || '').toLowerCase();
                    const impKwota = parseFloat(i.totalAmount || 0);
                    return invName && impName && invName === impName && Math.abs(kwota - impKwota) < 1;
                  });
                  const orderId = matchedImp ? matchedImp.allegroOrderId : 'fakturownia_' + inv.id;
                  next[orderId] = {
                    id: inv.id,
                    fakturowniaId: String(inv.id),
                    number: inv.number || inv.full_number,
                    date: inv.issue_date,
                    kwota: kwota,
                    klientNazwa: inv.buyer_name || '',
                    nip: inv.buyer_tax_no || '',
                    allegroOrderId: matchedImp ? matchedImp.allegroOrderId : '',
                    kontoId: matchedImp ? matchedImp.kontoId : '',
                    firma: matchedImp ? KONTO_DO_FIRMY[matchedImp.kontoId] || 'F' : 'F',
                    allegroAttached: false,
                    _autoSync: true
                  };
                }
              });
              try {
                localStorage.setItem('invoices_sent', JSON.stringify(next));
              } catch (e) {}
              return next;
            });
          }).catch(function () {});
        }
      }
      // Auto-aktualizuj statusy na podstawie fulfillmentStatus z Allegro
      setAppStatuses(prev => {
        const next = {
          ...prev
        };
        let changed = false;
        allResults.forEach(imp => {
          const fs = imp.fulfillmentStatus || '';
          const id = imp.allegroOrderId;
          if (!id) return;
          if ((fs === 'SENT' || fs === 'DELIVERED') && next[id] !== 'Wysłano') {
            next[id] = 'Wysłano';
            changed = true;
            // Zapisz timestamp
            const times = JSON.parse(localStorage.getItem('app_status_times') || '{}');
            times[id] = new Date().toISOString();
            localStorage.setItem('app_status_times', JSON.stringify(times));
          } else if (fs === 'READY_FOR_SHIPMENT' && !next[id]) {
            next[id] = 'W realizacji';
            changed = true;
          }
        });
        if (changed) localStorage.setItem('app_statuses', JSON.stringify(next));
        return changed ? next : prev;
      });
      if (allResults.length === 0) setAllegroImportError("Brak zamówień — sprawdź czy tokeny są zsynchronizowane w Admin → Autoresponder → Synchronizuj tokeny");
      if (d.errors && d.errors.length > 0) console.warn("Błędy pobierania:", d.errors);
    } catch (e) {
      setAllegroImportError("❌ " + e.message);
      console.error("fetchAllegroOrders:", e);
    }
    setAllegroImportLoading(false);
  }

  // ── Parsowanie wymiarów z nazwy oferty Allegro ──
  function parseDimsFromOfferName(offerName) {
    const name = offerName || "";
    const dimMatch = name.match(/(\d{2,3}[,.]?\d*)\s*[xX\u00d7\u0445]\s*(\d{2,3}[,.]?\d*)/);
    if (!dimMatch) return null;
    let s = parseFloat(dimMatch[1].replace(",", ".")),
      w = parseFloat(dimMatch[2].replace(",", "."));
    if (s > w && w > 0) {
      const tmp = s;
      s = w;
      w = tmp;
    }
    const KOLOR_NR = {
      "1": "Biały",
      "2": "Brąz",
      "3": "Antracyt",
      "4": "Czarny",
      "5": "Złoty Dąb",
      "6": "Ciemny Dąb",
      "7": "Turner Oak",
      "8": "Orzech",
      "9": "Winchester",
      "10": "Mahoń"
    };
    const KOLORY_RAMKI = [["winchester", "Winchester"], ["biał", "Biały"], ["antracyt", "Antracyt"], ["brąz", "Brąz"], ["czarny", "Czarny"], ["orzech", "Orzech"], ["turner", "Turner Oak"], ["złoty dąb", "Złoty Dąb"], ["ciemny dąb", "Ciemny Dąb"], ["złot", "Złoty Dąb"], ["ciemny", "Ciemny Dąb"], ["mahon", "Mahoń"], ["maho\u0144", "Maho\u0144"]];
    const KOLORY_SIATKI = [["czar", "Czarna"], ["szar", "Szara"], ["biał", "Biała"], ["antracyt", "Antracyt"]];
    let kolorRamki = "Antracyt",
      kolorSiatki = "Czarna";
    const lower = name.toLowerCase();
    // Najpierw sprawdź kod numeryczny np. "kolor 9" lub "kol 9"
    const nrMatch = lower.match(/(?:kolor|kol\.?)\s*(\d{1,2})/);
    if (nrMatch && KOLOR_NR[nrMatch[1]]) kolorRamki = KOLOR_NR[nrMatch[1]];else {
      for (const [pat, val] of KOLORY_RAMKI) {
        if (lower.includes(pat)) {
          kolorRamki = val;
          break;
        }
      }
    }
    const parts = lower.split(/\d+\s*[xX\u00d7]\s*\d+/);
    const afterDims = parts[1] || "";
    for (const [pat, val] of KOLORY_SIATKI) {
      if (afterDims.includes(pat)) {
        kolorSiatki = val;
        break;
      }
    }
    return {
      szerokosc: String(s),
      wysokosc: String(w),
      glebokosc: String(DOMYSLNA_GLEBOKOS),
      kolorRamki,
      kolorSiatki,
      ilosc: 1
    };
  }

    }

    };

    if ((r.includes("ciem") || r.includes("dark")) && (r.includes("dab") || r.includes("oak"))) return "Ciemny Dąb";
    if (r.includes("zlot") || r.includes("gold")) return "Złoty Dąb";
    if (r.includes("dab") || r.includes("oak")) return "Ciemny Dąb";
    if (r.includes("bia") || r.includes("white")) return "Biały";
    if (r.includes("antracyt") || r.includes("antr") || r.includes("graph")) return "Antracyt";
    if (r.includes("czar") || r.includes("black")) return "Czarny";

    return raw.split(" ")[0] || "Antracyt";

  function sprawdzJednostki(imp) {
    // Zwraca null (OK), 'yellow' lub 'red' + komunikat
    const msg = (imp.buyerMsg || '').toLowerCase();
    const qty = parseInt(imp.quantity) || 1;
    const price = parseFloat(imp.totalAmount || 0) / qty;
    // Alert: cena za jednostkę < 5 zł (klient myśli że to cena za całość)
    if (price > 0 && price < 5) return {
      color: 'red',
      msg: '⚠️ Cena ' + price.toFixed(2) + ' zł/szt — klient mógł myśleć że to cena za całość'
    };
    // Sprawdź czy jest moskitiera (jednostki obwodowe)
    const offerL = (imp.offerNames || '').toLowerCase();
    if (!offerL.includes('moskitier') && !offerL.includes('siatk')) return null;
    // Wyciągnij wymiary z wiadomości
    // Szukaj wymiarów TYLKO z jednostką cm/mm lub w kontekście "szerokość/wysokość"
    const wymPattern = /(\d+[\.,]?\d*)\s*(?:cm|mm)\s*[x×xX\*]\s*(\d+[\.,]?\d*)\s*(?:cm|mm)/gi;
    const wymPattern2 = /(\d+[\.,]?\d*)\s*[x×xX\*]\s*(\d+[\.,]?\d*)\s*(?:cm|mm)/gi;
    const wymPattern3 = /(?:szeroko[śs][ćc]|szer\.?|width)[^\d]{0,10}(\d{2,3}(?:[\.,]\d)?)\s*(?:cm|mm)?/i;
    const wymPattern4 = /(?:wysoko[śs][ćc]|wys\.?|height)[^\d]{0,10}(\d{2,3}(?:[\.,]\d)?)\s*(?:cm|mm)?/i;
    let wymiary = [];
    let m;
    // Wzorzec 1: X cm x Y cm
    while ((m = wymPattern.exec(msg)) !== null) {
      const a = parseFloat(m[1].replace(',', '.')),
        b = parseFloat(m[2].replace(',', '.'));
      if (a > 10 && b > 10 && a < 400 && b < 400) wymiary.push([a, b]);
    }
    // Wzorzec 2: X x Y cm (tylko jedna jednostka)
    if (wymiary.length === 0) {
      while ((m = wymPattern2.exec(msg)) !== null) {
        const a = parseFloat(m[1].replace(',', '.')),
          b = parseFloat(m[2].replace(',', '.'));
        if (a > 10 && b > 10 && a < 400 && b < 400) wymiary.push([a, b]);
      }
    }
    // Wzorzec 3: szerokość X wysokość Y
    if (wymiary.length === 0) {
      const mSzer = wymPattern3.exec(msg);
      const mWys = wymPattern4.exec(msg);
      if (mSzer && mWys) {
        const a = parseFloat(mSzer[1]),
          b = parseFloat(mWys[1]);
        if (a > 10 && b > 10 && a < 400 && b < 400) wymiary.push([a, b]);
      }
    }
    if (wymiary.length === 0) {
      // Brak wymiarów - alert tylko przy bardzo małej ilości
      if (qty <= 10) return {
        color: 'yellow',
        msg: '⚠️ Mała ilość (' + qty + ' szt) — sprawdź czy klient podał wymiary'
      };
      return null;
    }
    // Licz wymagane jednostki dla każdego okna
    let wymagane = 0;
    wymiary.forEach(function (wym) {
      const obwod = 2 * (wym[0] + wym[1]);
      wymagane += Math.ceil(obwod / 10);
    });
    if (wymagane === 0) return null;
    const roznica = wymagane - qty;
    if (roznica > 0) {
      const procent = roznica / wymagane;
      if (procent >= 0.4) return {
        color: 'red',
        msg: '🔴 Za mało jednostek: kupił ' + qty + ', potrzeba ~' + wymagane + ' (brakuje ' + roznica + ')'
      };
      if (procent > 0.1) return {
        color: 'yellow',
        msg: '🟡 Możliwy błąd: kupił ' + qty + ', potrzeba ~' + wymagane
      };
    }
    return null;
  }

  // Pobierz ustawienia klienta (email produkcji, DPD) z KV — zapewnia spójność desktop ↔ telefon
  async function subscribePush() {
    try {
      const reg = await navigator.serviceWorker.ready;
      // Pobierz klucz publiczny VAPID z workera
      const vr = await fetch(AUTORESPONDER_URL + '/push/vapid-public');
      const vd = await vr.json();
      const pub = vd.publicKey;
      // Konwertuj base64url na Uint8Array
      const padding = '='.repeat((4 - pub.length % 4) % 4);
      const base64 = (pub + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      // Subskrybuj
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: raw
      });
      // Wyślij do workera
      const r = await fetch(AUTORESPONDER_URL + '/push/subscribe', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': AUTORESPONDER_KEY
        },
        body: JSON.stringify(sub.toJSON())
      });
      const d = await r.json();
      if (d.ok) alert('✅ Powiadomienia włączone! (subskrypcji: ' + d.count + ')');else alert('❌ Błąd: ' + JSON.stringify(d));
    } catch (e) {
      alert('❌ Błąd powiadomień: ' + e.message);
    }
  }

  // Kalkulator zapisuje wymiary w mm (toMM). Aplikacja oczekuje cm.
  // Heurystyka: jeśli wartość > 300 → to mm (dziel przez 10); inaczej to już cm (legacy).
  function kalDim(v) {
    const n = parseFloat(String(v || "").replace(",", "."));
    if (!n || isNaN(n)) return "";
    if (n > 300) {
      const cm = n / 10;
      // format: 76.7 → "76,7", 767 → "76,7", 760 → "76"
      return (Math.round(cm * 10) / 10).toString().replace(".", ",");
    }
    return String(v).replace(".", ",");
  }

    const modeLabel = offSaveMode === 'textonly' ? 'TYLKO TEKSTY (zdjęcia każdej aukcji zostają)' : 'PEŁNY OPIS (zastąpi wszystko)';
    if (!confirm('Zaktualizować ' + offSelected.size + ' aukcji?\nTryb: ' + modeLabel)) return;
    setOffSaving(true); setOffSaveMsg('');
    // Wyciągnij teksty z szablonu (w kolejności wystąpienia)
    const templateTexts = [];
    (template.sections || []).forEach(function(sec){ (sec.items||[]).forEach(function(item){ if(item.type==='TEXT') templateTexts.push(item.content||''); }); });
    let ok = 0, err = 0; const errMsgs = [];
    for (const id of offSelected) {
      try {
        let descToSave = template;
        if (offSaveMode === 'textonly') {
          // Pobierz aktualny opis aukcji, podmień tylko TEXT, zachowaj IMAGE
          const fetchR = await fetch(AUTORESPONDER_URL + '/allegro/offer/' + id + '?kontoId=' + offKonto, {
            headers: {'x-api-key': wKey || AUTORESPONDER_KEY}
          });
          const fetchD = await fetchR.json();
          if (fetchD.ok && fetchD.offer && fetchD.offer.description && fetchD.offer.description.sections) {
            let tIdx = 0;
            const newSections = fetchD.offer.description.sections.map(function(sec){
              return { items: sec.items.map(function(item){
                if (item.type === 'TEXT') { return { type:'TEXT', content: templateTexts[tIdx++] !== undefined ? templateTexts[tIdx-1] : item.content }; }
                return item; // IMAGE i inne bez zmian
              })};
            });
            descToSave = { sections: newSections };
          }
        }
        const r = await fetch(AUTORESPONDER_URL + '/allegro/offer/' + id + '/description', {
          method: 'PUT',
          headers: {'Content-Type': 'application/json', 'x-api-key': wKey || AUTORESPONDER_KEY},
          body: JSON.stringify({kontoId: offKonto, description: descToSave})
        });
        const d = await r.json();
        if (d.ok) ok++;
        else {
          err++;
          const msg = d.error || JSON.stringify(d).slice(0,120);
          const scopeHint = (msg.includes('403') || msg.includes('forbidden') || msg.includes('scope') || msg.toLowerCase().includes('access denied'))
            ? ' [brak scope allegro:api:sale:offers:write?]' : '';
          errMsgs.push(id.slice(-6) + ': ' + msg + scopeHint);
          console.warn('Blad oferty ' + id, d);
        }
      } catch(e) { err++; errMsgs.push(id.slice(-6) + ': ' + e.message); }
    }
    const base = ok > 0 ? '✅ Zaktualizowano: ' + ok : '';
    const errPart = err > 0 ? (base ? '  ❌ Bledy: ' : '❌ ') + errMsgs.join(' | ') : '';
    setOffSaveMsg(base + errPart || '(brak wynikow)');
    setOffSaving(false);
  }

  async function createFakturowniaInvoice(imp, order) {
    const cfg = fakturowniaConfig;

    const firmaId = KONTO_DO_FIRMY[imp.kontoId] || KONTO_DO_FIRMY[order?.firma] || 'F';
    const deptId = FAKTUROWNIA_DEPT[firmaId];
    const kraj = (imp.klientKraj || 'PL').toUpperCase();
    const vat = kraj === 'PL' ? 23 : OSS_RATES[kraj] || 23;
    const useOss = kraj !== 'PL' ? 1 : 0;
    const waluta = imp.kwotaWaluta || 'PLN';
    const kwota = parseFloat(imp.totalAmount || order?.kwota || 0);

    const pozNazwy = imp.offerNames || order?.pozycje?.map(p => `Moskitiera ${p.szerokosc}×${p.wysokosc}cm ${p.kolorRamki || ''}`.trim()).join(', ') || 'Moskitiera na wymiar';
    const buyerNip = imp.nabywcaNip || order?.nabywcaNip || '';
    const buyerCompany = !!buyerNip;
    const buyerName = imp.nabywcaNazwa || imp.klientImie || order?.klientImie || '';
    const payload = {
      api_token: cfg.token,
      invoice: {
        kind: 'vat',
        issue_date: new Date().toISOString().slice(0, 10),
        sell_date: (imp.boughtAt || new Date().toISOString()).slice(0, 10),
        payment_to: (imp.boughtAt || new Date().toISOString()).slice(0, 10),
        // Allegro = opłacone → termin = data sprzedaży
        payment_type: 'transfer',
        currency: waluta,
        lang: kraj === 'PL' ? 'pl' : kraj === 'CZ' ? 'cs' : kraj === 'SK' ? 'sk' : kraj === 'HU' ? 'hu' : 'pl',
        use_oss: useOss,
        department_id: deptId,
        oid: imp.allegroOrderId || '',
        oid_unique: 'yes',
        buyer_name: buyerName,
        buyer_company: buyerCompany,
        buyer_tax_no: buyerNip,
        buyer_street: imp.klientUlica || order?.klientUlica || '',
        buyer_post_code: imp.klientKod || order?.klientKod || '',
        buyer_city: imp.klientMiasto || order?.klientMiasto || '',
        buyer_country: kraj,
        buyer_email: imp.email || '',
        positions: [{
          name: pozNazwy,
          quantity: imp.totalQuantity || 1,
          total_price_gross: kwota,
          tax: vat
        }]
      }
    };
    const resp = await fetch(`https://${cfg.domain}/invoices.json`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(JSON.stringify(err));
    }
    return await resp.json();

  }

  function buildShipmentDesc(imp, nrZlec) {
    const MATA_REGEX = /mata|podkładka|ochronna/i;
    const isMata = MATA_REGEX.test(imp.offerNames || "");
    const offerLower = (imp.offerNames || "").toLowerCase();
    const duza = isMata && (offerLower.includes("205") || offerLower.includes("duż"));
    // Kosmetyki — mapuj po słowniku
    const userDict = produktSlownik || [];
    function _mapK(name) {
      const n = name.toLowerCase();
      for (const w of userDict) {
        if (w.fraza && n.includes(w.fraza.toLowerCase())) return w.skrot;
      }
      const zap = n.includes('boxer') ? 'box' : n.includes('silver') || n.includes('silv') ? 'sil' : n.includes('tobacco') || n.includes('tob') ? 'tob' : n.includes('terre') ? 'ter' : n.includes('aqua') ? 'aqu' : n.includes('gold') ? 'gol' : n.includes('adventure') || n.includes('adv') ? 'adv' : '';
      if ((n.includes('pomada') || n.includes('pomad')) && n.includes('brod')) return 'p br' + (zap ? ' ' + zap : '');
      if (n.includes('balsam') && n.includes('brod')) return 'bal br' + (zap ? ' ' + zap : '');
      if (n.includes('olejek') || n.includes('olej')) return 'ol' + (zap ? ' ' + zap : '');
      if ((n.includes('pomada') || n.includes('pomad')) && !n.includes('brod')) {
        if (n.includes('silver') || n.includes('srebrn') || n.includes('silv')) return 'p sr';
        if (n.includes('aqua')) return 'p ss';
        if (n.includes('boxer') || n.includes('złot') || n.includes('zlot') || n.includes('żółt')) return 'p zł';
        if (n.includes('adventure') || n.includes('adv')) return 'p adv';
        if (n.includes('czerwon') || n.includes('woskov') || n.includes('woskow')) return 'p cz';
        if (n.includes('super') || n.includes('strong') && n.includes('aqua')) return 'p ss';
        return 'p sr';
      }
      if (n.includes('pre-styl') || n.includes('prestyler') || n.includes('pre styl')) return 'pre-st';
      if (n.includes('szampon') && n.includes('brod')) return 'sz br';
      if (n.includes('szampon')) {
        return n.includes('500') ? 'sz 500' : 'sz 250';
      }
      if (n.includes('żel') && (n.includes('po golen') || n.includes('after'))) return 'ż as';
      if (n.includes('żel') && (n.includes('przed golen') || n.includes('before') || n.includes('bs'))) return 'ż bs';
      if (n.includes('żel') && n.includes('golen')) return 'ż 500';
      if (n.includes('woda') && n.includes('golen')) return 'as' + (zap ? ' ' + zap : '');
      if (n.includes('odżywka') || n.includes('odzywka')) return 'odż wł';
      if (n.includes('pomadka')) return 'pom ust';
      if (n.includes('grooming')) return 'groom';
      if (n.includes('gumk') && (n.includes('recepturk') || n.includes('kg') || n.includes('gumow'))) return '1 gr';
      if (n.includes('woreczk') || n.includes('worek') && n.includes('moskitier')) return '1 wor';
      if (n.includes('tac') && n.includes('90')) return '1 tac 90';
      if (n.includes('tac') && n.includes('60')) return '1 tac 60';
      if (n.includes('tac')) return '1 tac';
      if (n.includes('drzwiczk') || n.includes('drzwi') && (n.includes('zwierz') || n.includes('kot') || n.includes('pies'))) return n.includes('duż') || n.includes('duz') || n.includes('large') ? '1 drzwiczki duże' : '1 drzwiczki małe';
      return '';
    }
    const offerArr = (imp.offerNames || "").split(", ");
    const pozycje = imp.pozycje || [];
    let kosmetykiDesc = '';
    const counts = {};
    if (pozycje.length > 0) {
      pozycje.forEach(p => {
        const nazwa = p.nazwa || p.name || "";
        const il = parseInt(p.ilosc) || 1;
        const sk = _mapK(nazwa) || _mapK(offerArr.find(o => o.toLowerCase().includes(nazwa.toLowerCase().slice(0, 6))) || nazwa);
        if (sk) counts[sk] = (counts[sk] || 0) + il;
      });
    } else {
      offerArr.forEach(n => {
        const sk = _mapK(n);
        if (sk) counts[sk] = (counts[sk] || 0) + 1;
      });
    }
    if (Object.keys(counts).length > 0) kosmetykiDesc = Object.entries(counts).map(([sk, il]) => il > 1 ? `${il}x ${sk}` : sk).join(', ');
    if (isMata) {
      let bsCount = 0,
        ssCount = 0;
      if (pozycje.length > 0) {
        pozycje.forEach(p => {
          const n = (p.nazwa || p.name || "").toLowerCase();
          const il = parseInt(p.ilosc) || 1;
          if (n.includes("205") || n.includes("duż")) bsCount += il;else ssCount += il;
        });
      }
      if (bsCount === 0 && ssCount === 0) {
        const tot = pozycje.length > 0 ? pozycje.reduce((a, p) => a + (parseInt(p.ilosc) || 1), 0) : 1;
        if (duza) bsCount = tot;else ssCount = tot;
      }
      const parts = [];
      if (bsCount > 0) parts.push(bsCount + " BS");
      if (ssCount > 0) parts.push(ssCount + " ss");
      return (nrZlec ? nrZlec + " " : "") + parts.join(" ");
    }
    if (kosmetykiDesc) return kosmetykiDesc;
    return nrZlec || '';
  }

  async function fetchPickupProposals(shipmentId, kontoId, address) {

      const today = nastepnyDzienRoboczy(); // zawsze następny dzień roboczy

        },

        })
      });
      console.log('📞 proposals sent:', JSON.stringify({

        readyDate: today,
        address
      }));
      const d = await r.json();
      console.log('📞 proposals response ok:', d.ok, 'data type:', typeof d.data, 'isArray:', Array.isArray(d.data), 'raw:', JSON.stringify(d).slice(0, 300));
      // Struktura: d.data=[{proposals:[{shipmentId,proposalItems:[{id,name}]}], pickupTimes:[{date,minTime,maxTime}]}]
      const dataArr = Array.isArray(d.data) ? d.data : [d.data || {}];
      const allTimes = [];
      const allItems = [];
      for (const entry of dataArr) {
        // pickupTimes może być na poziomie entry lub wewnątrz proposals
        const times = entry?.pickupTimes || [];
        const proposals = entry?.proposals || [];
        for (const prop of proposals) {
          const items = prop?.proposalItems || [];
          allItems.push(...items);
        }
        allTimes.push(...times);
      }
      // Jeśli brak pickupTimes ale są proposalItems — użyj ich jako terminów
      if (allTimes.length === 0 && allItems.length > 0) {
        for (const item of allItems) {
          // proposalItem.name format: "2026-04-27 09:00-17:00"
          const m = (item.name || '').match(/(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})-(\d{2}:\d{2})/);
          if (m) allTimes.push({
            date: m[1],
            minTime: m[2],
            maxTime: m[3],
            id: item.id
          });
        }
      }
      console.log('📞 found times:', allTimes.length);
      if (allTimes.length > 0) {
        const enriched = allTimes.map((t, i) => ({
          ...t,
          id: allItems[i]?.id || null
        }));
        setPickupProposals(enriched);
        setPickupTime(enriched[0]);
      } else {
        setPickupDate(nastepnyDzienRoboczy());
      }
    } catch (e) {
      console.warn('pickup proposals error:', e);
    }
    setPickupLoading(false);
  }

    const linkedOrders = imps.map(imp => orders.find(o => o.allegroOrderId === imp.allegroOrderId)).filter(Boolean);

      // Scal istniejące zlecenia

      if (klienci.length > 1) {
        if (!confirm(`Zamówienia należą do różnych klientów:\n${klienci.join('\n')}\nCzy na pewno scalić?`)) return;
      }
      const base = linkedOrders[0];
      const rest = linkedOrders.slice(1);
      const allPozycje = linkedOrders.flatMap(o => o.pozycje || []);
      const mergedOrder = {
        ...base,
        pozycje: allPozycje,
        status: 'W realizacji',
        _mergedFrom: linkedOrders.map(o => o.id)
      };
      const updatedOrders = orders.map(o => {

          _mergedInto: base.id
        };
        return o;
      });

          ...allegroShipments
        };
        rest.forEach(o => {
          if (o.allegroOrderId) newShipments[o.allegroOrderId] = {
            ...baseSh
          };
        });
        setAllegroShipments(newShipments);
        localStorage.setItem('allegro_shipments', JSON.stringify(newShipments));
      }
      // Ustaw W realizacji dla wszystkich scalonych — atomicznie w jednym wywołaniu
      setAppStatuses(prev => {
        const next = {
          ...prev

        imps.forEach(imp => {
          if (imp.allegroOrderId) next[imp.allegroOrderId] = 'W realizacji';
