    const workerKey = getWorkerKey();

      // Fallback: JSONBin

      try {

    }
    try {
      const res = await fetch(WORKER_URL + '/mosk/orders', { headers: { 'x-api-key': workerKey } });
      const data = await res.json();
      return { key, value: JSON.stringify(data.orders || []) };
    } catch(e) { console.error('KV get error:', e); return null; }
  },

  async set(key, value) {
    const workerKey = getWorkerKey();
    if (!workerKey) {
      // Fallback: JSONBin
      const { apiKey, binId } = getSettings();
      if (!apiKey || !binId) { localStorage.setItem(key, value); return { key, value }; }
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },

        return { key, value };
      } catch(e) { return { key, value, error: e.message }; }
    }
    try {
      const res = await fetch(WORKER_URL + '/mosk/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': workerKey },
        body: JSON.stringify({ orders: JSON.parse(value) })
      });
      if (!res.ok) return { key, value, error: 'KV HTTP ' + res.status };
      return { key, value };
    } catch(e) {
      console.error('KV set error:', e);
      return { key, value, error: e.message };
    }
  },

  });

  });

}

  async function fetchInvoiceFromAllegro(orderId, firma){
    const kontaMap={"F":"favo5","AR":"arlis_pl","AP":"albama_eu","E":"everis_pl"};
    const kontoId=kontaMap[firma]||"favo5"; // fallback, używany tylko dla faktur
    let token=allegroTokens[kontoId]||"";
    if(!token) return {error:"Brak tokenu dla konta "+kontoId+". Zaloguj się w Admin → Allegro."};
    const url=AUTORESPONDER_URL+"/api/order/checkout-forms/"+orderId.trim();
    let r=await fetch(url,{headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.allegro.public.v1+json"}});
    if(r.status===401){
      const ok=await allegroRefresh(kontoId);
      if(!ok) return {error:"Sesja wygasła — zaloguj się ponownie w Admin → Allegro."};
      token=allegroTokens[kontoId]||"";
      r=await fetch(url,{headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.allegro.public.v1+json"}});
    }
    if(!r.ok) return {error:"Błąd API: "+r.status+" — sprawdź nr zamówienia i konto."};
    const d=await r.json();
    // Dane do faktury
    const inv=d.invoice||{};
    const invAddr=inv.address||{};
    const buyer=d.buyer||{};
    const delAddr=(d.delivery&&d.delivery.address)||{};

    // Preferuj dane z invoice, fallback na adres dostawy
    // company to obiekt {name:...}, naturalPerson to obiekt {firstName, lastName} lub null
    const companyName=invAddr.company&&invAddr.company.name?invAddr.company.name:null;
    const np=invAddr.naturalPerson||{};
    const npName=np.firstName&&np.lastName?(np.firstName+" "+np.lastName):null;
    const buyerName=buyer.firstName&&buyer.lastName?(buyer.firstName+" "+buyer.lastName):null;
    const nazwa=companyName||npName||buyerName||buyer.login||"";
    // taxId może być w invAddr lub inv
    const nipFromIds=invAddr.ids&&invAddr.ids.length>0?invAddr.ids.find(function(x){return x.type==="PL_NIP";})||invAddr.ids[0]:null;
    const nip=invAddr.taxId||inv.taxId||(nipFromIds?nipFromIds.value:"")||(invAddr.company&&invAddr.company.ids?((invAddr.company.ids.find(function(x){return x.type==="PL_NIP";})||invAddr.company.ids[0]||{}).value||""):"");
    const ulica=invAddr.street||delAddr.street||"";
    const kod=invAddr.zipCode||delAddr.zipCode||"";
    const miasto=invAddr.city||delAddr.city||"";
    // Produkty i kwota
    const items=d.lineItems||[];
    const summary=d.summary||{};
    const kwotaBrutto=summary.totalToPay?parseFloat(summary.totalToPay.amount):0;
    // Buduj pozycje z rzeczywistych produktów
    const pozycje=items.length>0?items.map(function(item){
      const cena=item.price?parseFloat(item.price.amount):0;
      const ilosc=item.quantity||1;
      return {nazwa:item.offer&&item.offer.name?item.offer.name:"Towar",ilosc:ilosc,jm:"szt",cena:cena*ilosc,vat:23};

    const dataZakupu=d.boughtAt?d.boughtAt.slice(0,10):(d.updatedAt?d.updatedAt.slice(0,10):"");
    return {nazwa,nip,ulica,kod,miasto,kwotaBrutto,pozycje,orderId,dataZakupu};

  function genFAxml(fv, sp){

    const pad2=n=>String(n).padStart(2,"0");
    const today=new Date();
    const dataWyst=fv.data||(today.getFullYear()+"-"+pad2(today.getMonth()+1)+"-"+pad2(today.getDate()));

      const ilosc=parseFloat(p.ilosc)||1;
      const cenaNetto=parseFloat(p.cenaNetto)||0;
      const vat=parseFloat(p.vat)||23;
      const wartNetto=Math.round(cenaNetto*ilosc*100)/100;

  function importHistCSV(year,text){
    const lines=text.trim().split(/\r?\n/);
    const header=lines[0].split(";").map(h=>h.trim().toLowerCase());
    const idx=(n)=>header.findIndex(h=>h.includes(n));
    const iNr=idx("nr"),iFirma=idx("firma"),iData=idx("data"),iKlient=Math.max(idx("klient"),idx("imię")),iMiasto=idx("miasto"),iTel=idx("tel"),iSzer=idx("szer"),iWys=idx("wys"),iGl=idx("głęb"),iKR=idx("ramki"),iKS=idx("siatki"),iBl=idx("blaszka"),iIl=idx("ilość");
    const grouped={};
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(";");
      if(cols.length<5||!cols[iSzer]) continue;
      const nr=cols[iNr]||("IMP-"+i);
      if(!grouped[nr]) grouped[nr]={id:Date.now()+i,numerZlecenia:nr,firma:cols[iFirma]||"F",data:cols[iData]||"",klientImie:cols[iKlient]||"",klientMiasto:cols[iMiasto]||"",telefon:cols[iTel]||"",uwagi:"",pozycje:[]};
      grouped[nr].pozycje.push({szerokosc:cols[iSzer]||"",wysokosc:cols[iWys]||"",glebokosc:cols[iGl]||"",kolorRamki:cols[iKR]||"",kolorSiatki:cols[iKS]||"",blaszRozmiar:cols[iBl]||"",ilosc:parseInt(cols[iIl])||1});
    }
    const arr=Object.values(grouped);
    const updated={...histOrders,[year]:arr};
    setHistOrders(updated);
    localStorage.setItem("hist_orders",JSON.stringify(updated));
    alert("Wgrano "+arr.length+" zamówień do roku "+year);
  }

        throw new Error("HTTP "+r.status+": "+txt.slice(0,200));
      }
      const d=await r.json();
      if(!d.ok) throw new Error(JSON.stringify(d));
      const rawOrders=d.orders||[];
      // Zaznacz które już są w bazie
      const allResults=rawOrders.map(imp=>({
        ...imp,
        alreadyExists:orders.some(o=>o.allegroOrderId===imp.allegroOrderId)
      }));
      // Sortuj: nowe pierwsze
      allResults.sort((a,b)=>{
        if(a.boughtAt&&b.boughtAt) return new Date(b.boughtAt)-new Date(a.boughtAt);
        return new Date(b.data)-new Date(a.data);
      });
      setAllegroImportResults(allResults);
      setAllegroImportShow(true);
      if(allResults.length===0) setAllegroImportError("Brak zamówień — sprawdź czy tokeny są zsynchronizowane w Admin → Autoresponder → Synchronizuj tokeny");
      if(d.errors&&d.errors.length>0) console.warn("Błędy pobierania:",d.errors);
    }catch(e){
      setAllegroImportError("❌ "+e.message);
      console.error("fetchAllegroOrders:",e);
    }
    setAllegroImportLoading(false);
  }

  // ── Parsowanie wymiarów z nazwy oferty Allegro ──
  function parseDimsFromOfferName(offerName){
    const name=offerName||"";
    const dimMatch=name.match(/(\d{2,3}[,.]?\d*)\s*[xX\u00d7\u0445]\s*(\d{2,3}[,.]?\d*)/);
    if(!dimMatch) return null;
    let s=parseFloat(dimMatch[1].replace(",",".")),
        w=parseFloat(dimMatch[2].replace(",","."));
    if(s>w&&w>0){const tmp=s;s=w;w=tmp;}
    const KOLORY_RAMKI=[["winchester","Winchester"],["bia\u0142","Bia\u0142y"],["antracyt","Antracyt"],["br\u0105z","Br\u0105z"],["czarny","Czarny"],["orzech","Orzech"],["turner","Turner Oak"],["z\u0142oty d\u0105b","Z\u0142oty D\u0105b"],["ciemny d\u0105b","Ciemny D\u0105b"],["z\u0142ot","Z\u0142oty D\u0105b"],["ciemny","Ciemny D\u0105b"]];
    const KOLORY_SIATKI=[["czar","Czarna"],["szar","Szara"],["bia\u0142","Bia\u0142a"],["antracyt","Antracyt"]];
    let kolorRamki="Antracyt", kolorSiatki="Czarna";
    const lower=name.toLowerCase();
    for(const [pat,val] of KOLORY_RAMKI){ if(lower.includes(pat)){kolorRamki=val;break;} }
    const parts=lower.split(/\d+\s*[xX\u00d7]\s*\d+/);
    const afterDims=parts[1]||"";
    for(const [pat,val] of KOLORY_SIATKI){ if(afterDims.includes(pat)){kolorSiatki=val;break;} }
    return {szerokosc:String(s),wysokosc:String(w),glebokosc:String(DOMYSLNA_GLEBOKOS),kolorRamki,kolorSiatki,ilosc:1};
  }

  // Parser wielopozycyjny z buyerMsg — wykrywa wiele wymiarów i ilości
  function parseMultiDimsFromMsg(msg){
    if(!msg) return null;
    const lower=msg.toLowerCase();
    const KOLORY_RAMKI=[["winchester","Winchester"],["bia\u0142","Bia\u0142y"],["antracyt","Antracyt"],["br\u0105z","Br\u0105z"],["czarny","Czarny"],["orzech","Orzech"],["turner","Turner Oak"],["z\u0142oty d\u0105b","Z\u0142oty D\u0105b"],["ciemny d\u0105b","Ciemny D\u0105b"],["z\u0142ot","Z\u0142oty D\u0105b"],["ciemny","Ciemny D\u0105b"]];
    const KOLORY_SIATKI=[["czarna","Czarna"],["czar","Czarna"],["szara","Szara"],["szar","Szara"]];
    let kolorRamki="Antracyt", kolorSiatki="Czarna";
    for(const [pat,val] of KOLORY_RAMKI){ if(lower.includes(pat)){kolorRamki=val;break;} }
    for(const [pat,val] of KOLORY_SIATKI){ if(lower.includes(pat)){kolorSiatki=val;break;} }
    const pozycje=[];
    // Format 1: 84x215 - 2 szt / 84x215 2szt / 84x215
    const dimRe1=/(\d{2,3}[,.]?\d*)\s*[xX\u00d7\u0445]\s*(\d{2,3}[,.]?\d*)\s*[-–]?\s*[xX]?\s*(\d+)?\s*(?:szt(?:uk[ia]?)?)?/gi;
    // Format 2: 878mm/996mm x2 sztuki / 878mm/996mm
    const dimRe2=/(\d{3,4})\s*mm\s*[\/\\]\s*(\d{3,4})\s*mm\s*[xX]?\s*(\d+)?\s*(?:szt(?:uk[ia]?)?)?/gi;
    let m;
    // Próbuj format mm najpierw
    let found=false;
    while((m=dimRe2.exec(msg))!==null){
      let s=parseFloat((parseFloat(m[1])/10).toFixed(1)), w=parseFloat((parseFloat(m[2])/10).toFixed(1));
      if(s>w&&w>0){const tmp=s;s=w;w=tmp;}
      const ilosc=parseInt(m[3])||1;
      if(s>10&&w>10) { pozycje.push({szerokosc:String(s),wysokosc:String(w),glebokosc:String(DOMYSLNA_GLEBOKOS),kolorRamki,kolorSiatki,ilosc}); found=true; }
    }
    // Jeśli nie znaleziono formatu mm — próbuj cm
    if(!found){
      while((m=dimRe1.exec(msg))!==null){
        let s=parseFloat(m[1].replace(",",".")), w=parseFloat(m[2].replace(",","."));
        if(s>w&&w>0){const tmp=s;s=w;w=tmp;}
        const ilosc=parseInt(m[3])||1;
        if(s>10&&w>10) pozycje.push({szerokosc:String(s),wysokosc:String(w),glebokosc:String(DOMYSLNA_GLEBOKOS),kolorRamki,kolorSiatki,ilosc});
      }
    }
    // Format 3: szerokość 65cm, wysokość 135cm / szerokosc: 65 cm
    const dimRe3=/(?:szeroko[sś][śc]\w*|szer\.?)\s*[:\-]?\s*(\d{2,3}[,.]?\d*)\s*(?:cm|CM)?\s*[,;]?\s*(?:wysoko[sś][śc]\w*|wys\.?)\s*[:\-]?\s*(\d{2,3}[,.]?\d*)\s*(?:cm|CM)?/gi;
    while((m=dimRe3.exec(msg))!==null){
      let s=parseFloat(m[1].replace(",",".")), w=parseFloat(m[2].replace(",","."));
      if(s>w&&w>0){const tmp=s;s=w;w=tmp;}
      if(s>10&&w>10) { pozycje.push({szerokosc:String(s),wysokosc:String(w),glebokosc:String(DOMYSLNA_GLEBOKOS),kolorRamki,kolorSiatki,ilosc:1}); found=true; }
    }
    return pozycje.length>0?pozycje:null;
  }

  function importAllegroOrder(imp){
    // Numer zapytania kalkulatora (np. FAV-260424-4185) może być w offerNames, uwagi lub buyerMsg
    const allText=(imp.offerNames||"")+" "+(imp.uwagi||"")+" "+(imp.buyerMsg||"");
    console.log("importAllegroOrder buyerMsg:", JSON.stringify(imp.buyerMsg));
    const kalMatch=allText.match(/(?:FAV|STR|ARL|ALB|EVR|KAL)-\d{6}-\d{4}/i);
    const kalNum=kalMatch?kalMatch[0].toUpperCase():"";
    if(kalNum) console.log("[KAL] wykryto numer zapytania:",kalNum);
    const firstOffer=(imp.offerNames||"").split(", ")[0];
    let parsedPoz=parseDimsFromOfferName(firstOffer);
    let parsedPozycje=parsedPoz?[parsedPoz]:null;
    // Jeśli brak wymiarów w nazwie oferty — spróbuj z buyerMsg (wielopozycyjnie)
    if((!parsedPozycje||parsedPozycje.length===0) && imp.buyerMsg){
      parsedPozycje=parseMultiDimsFromMsg(imp.buyerMsg);
      if(!parsedPozycje||parsedPozycje.length===0) parsedPozycje=[parseDimsFromOfferName(imp.buyerMsg)].filter(Boolean);
    }
    if(parsedPozycje&&parsedPozycje.length===0) parsedPozycje=null;
    // Wykryj kolory z buyerMsg (priorytet) lub offerNames i nadpisz wszystkie pozycje
    const colorSrc=((imp.buyerMsg||"")+" "+(imp.offerNames||"")).toLowerCase();
    const KOLORY_RAMKI_MAP=[
      ["winchester","Winchester"],["biały","Biały"],["bial","Biały"],
      ["antracyt","Antracyt"],["brąz","Brąz"],["braz","Brąz"],
      ["czarny","Czarny"],["orzech","Orzech"],
      ["turner","Turner Oak"],["złoty dąb","Złoty Dąb"],["zloty dab","Złoty Dąb"],
      ["ciemny dąb","Ciemny Dąb"],["ciemny dab","Ciemny Dąb"]
    ];
    const KOLORY_SIATKI_MAP=[["szara","Szara"],["szar","Szara"],["czarna","Czarna"],["czarn","Czarna"]];
    if(parsedPozycje){
      console.log("parsedPozycje przed nadpisaniem:", JSON.stringify(parsedPozycje));
      console.log("colorSrc:", colorSrc);
      parsedPozycje=parsedPozycje.map(p=>{
        const np={...p};
        for(const [pat,val] of KOLORY_RAMKI_MAP){ if(colorSrc.includes(pat)){np.kolorRamki=val;break;} }
        for(const [pat,val] of KOLORY_SIATKI_MAP){ if(colorSrc.includes(pat)){np.kolorSiatki=val;break;} }
        return np;
      });
      console.log("parsedPozycje po nadpisaniu:", JSON.stringify(parsedPozycje));
    }
    setImportModal({
      imp,
      mode:kalNum?"kal":(parsedPozycje?"parse":"manual"),
      kalNum,
      kalLoading:!!kalNum,
      kalError:"",
      kalData:null,
      pozycje:parsedPozycje||[pustaPoz()]
    });
    // Auto-fetch danych kalkulatora jeśli numer został wykryty
    if(kalNum){
      fetch(AUTORESPONDER_URL+"/kalkulator/order/"+encodeURIComponent(kalNum.toLowerCase()))
        .then(r=>r.json())
        .then(d=>{
          if(d.error||!d.orderNumber){
            setImportModal(prev=>prev?{...prev,kalLoading:false,kalError:"Nie znaleziono: "+kalNum}:prev);
          } else {
            setImportModal(prev=>prev?{...prev,kalLoading:false,kalData:d,kalError:""}:prev);
            console.log("[KAL] auto-załadowano dane dla",kalNum,"-",(d.pozycje||[]).length,"pozycji");
          }
        })
        .catch(e=>{
          setImportModal(prev=>prev?{...prev,kalLoading:false,kalError:e.message||"Błąd pobierania"}:prev);
        });
    }
  }

  // Mapowanie nazw RAL z kalkulatora do krótkich nazw w MosquitoApp
  function mapKolorProfilu(raw){
    if(!raw) return "Antracyt";
    const r=raw.toLowerCase();
    if(r.includes("bia")) return "Biały";
    if(r.includes("antracyt")) return "Antracyt";
    if(r.includes("br") && r.includes("z")) return "Brąz";
    if(r.includes("czar")) return "Czarny";
    if(r.includes("d") && (r.includes("b")||r.includes("dąb")||r.includes("dab"))) return "Dąb";
    if(r.includes("srebrn")) return "Srebrna";
    if(r.includes("zlot")||r.includes("złot")) return "Złota";
    if(r.includes("szar")) return "Szara";
    // fallback: pierwsze słowo
    return raw.split(" ")[0]||"Antracyt";
  }
  function mapKolorSiatki(raw){
    if(!raw) return "Czarna";
    const r=raw.toLowerCase();
    if(r.includes("szar")) return "Szara";
    return "Czarna";
  }

      if(!d.ok) return;
      const changed=[];

        };

          localStorage.setItem('email_produkcji_config',JSON.stringify(remoteEmail));
          changed.push('email');
        }
      }
      // DPD config
      if(d.dpd && (d.dpd.login||d.dpd.fid)){

          fid:d.dpd.fid||localDpd.fid||'',
          password:d.dpd.password||localDpd.password||''
        };
        if(JSON.stringify(localDpd)!==JSON.stringify(remoteDpd)){
          localStorage.setItem('dpd_config',JSON.stringify(remoteDpd));
          changed.push('DPD');
        }
      }
      if(changed.length) console.log('[SETTINGS] synced from KV:',changed.join(', '));

  // Kalkulator zapisuje wymiary w mm (toMM). Aplikacja oczekuje cm.
  // Heurystyka: jeśli wartość > 300 → to mm (dziel przez 10); inaczej to już cm (legacy).
  function kalDim(v){
    const n = parseFloat(String(v||"").replace(",","."));
    if(!n || isNaN(n)) return "";
    if(n > 300) {
      const cm = n / 10;
      // format: 76.7 → "76,7", 767 → "76,7", 760 → "76"
      return (Math.round(cm*10)/10).toString().replace(".",",");
    }
    return String(v).replace(".",",");
  }

  async function createShipment(){
    if(!shipmentModal) return;
    const {imp, services}=shipmentModal;
    setShipmentCreating(true);
    setShipmentError("");
    const service=services.find(s=>s.id===shipmentServiceId)||services[0];
    const isInPost=(service?.name||'').toLowerCase().includes('inpost')||(service?.name||'').toLowerCase().includes('paczkomat')||(service?.carrierId||'').toLowerCase().includes('inpost');
    const isDPDPickup=(service?.name||'').toLowerCase().includes('pickup')||(service?.name||'').toLowerCase().includes('odbiór w punkcie dpd')||(service?.name||'').toLowerCase().includes('ad)');
    const isPickupPoint=isInPost||isDPDPickup;
    const SIZES={"A":{length:64,width:38,height:8,weight:25},"B":{length:64,width:38,height:19,weight:25},"C":{length:64,width:38,height:41,weight:25}};
    // Auto-kalkulator paczek
    const desc=(shipmentDescription||"").toLowerCase();
    const ssMatch=desc.match(/(\d+)\s*ss/);
    const bsMatch=desc.match(/(\d+)\s*bs/);
    const ssCount=ssMatch?parseInt(ssMatch[1]):0;
    const bsCount=bsMatch?parseInt(bsMatch[1]):0;
    let autoPkgs=[];
    if(ssCount>0||bsCount>0){
      if(ssCount>0){
        const batches=Math.ceil(ssCount/4);
        for(let b=0;b<batches;b++){
          const n=Math.min(4,ssCount-b*4);
          autoPkgs.push({type:"PACKAGE",weight:{value:n*2,unit:"KILOGRAMS"},length:{value:110,unit:"CENTIMETER"},width:{value:n*10,unit:"CENTIMETER"},height:{value:10,unit:"CENTIMETER"},textOnLabel:`${n} ss`});
        }
      }
      if(bsCount>0){
        const batches=Math.ceil(bsCount/2);
        for(let b=0;b<batches;b++){
          const n=Math.min(2,bsCount-b*2);
          autoPkgs.push({type:"PACKAGE",weight:{value:n*4,unit:"KILOGRAMS"},length:{value:130,unit:"CENTIMETER"},width:{value:n*10,unit:"CENTIMETER"},height:{value:10,unit:"CENTIMETER"},textOnLabel:`${n} BS`});
        }
      }
    }
    const manualPkg={type:"PACKAGE",weight:{value:isInPost?(SIZES[shipmentSize]||SIZES["A"]).weight:shipmentCustomSize?.weight||5,unit:"KILOGRAMS"},length:{value:isInPost?(SIZES[shipmentSize]||SIZES["A"]).length:shipmentCustomSize?.length||64,unit:"CENTIMETER"},width:{value:isInPost?(SIZES[shipmentSize]||SIZES["A"]).width:shipmentCustomSize?.width||38,unit:"CENTIMETER"},height:{value:isInPost?(SIZES[shipmentSize]||SIZES["A"]).height:shipmentCustomSize?.height||15,unit:"CENTIMETER"},textOnLabel:shipmentDescription||""};
    const packages=autoPkgs.length>0?autoPkgs:[manualPkg];
    if(!service){setShipmentError("❌ Brak dostępnych usług dostawy dla tego zamówienia");setShipmentCreating(false);return;}
    try{
      // Krok 1: utwórz przesyłkę
      const firma=FIRMY_DANE[imp.firma]||FIRMY_DANE["F"];
      const commandId=crypto.randomUUID();
      const createBody={
        commandId,
        input:{
          orders:[{orderId:imp.allegroOrderId}],
          deliveryMethodId:service.id,
          ...(service.credentialsId?{credentialsId:service.credentialsId}:{}),
          sender:{
            name:firma.nazwa,
            street:firma.adres,
            postalCode:firma.kod,
            city:firma.miasto,
            countryCode:"PL",
            phone:"+48605361191",
            email:firma.email
          },
          receiver:{
            name:imp.klientImie||"",
            street:imp.klientUlica||"",
            postalCode:imp.klientKod||"",
            city:imp.klientMiasto||"",
            countryCode:"PL",
            phone:imp.telefon||"",
            email:imp.klientEmail||"",
            ...(isPickupPoint && imp.pickupPointId ? {point:imp.pickupPointId} : {})
          },
          packages,
          ...(isPickupPoint?{additionalServices:["sendingAtPoint"]}:{})
        }
      };
      console.log("createBody:", JSON.stringify(createBody, null, 2));
      const r1=await fetch(AUTORESPONDER_URL+"/shipment/create?kontoId="+imp.kontoId,{
        method:"POST",
        headers:{"x-api-key":AUTORESPONDER_KEY,"Content-Type":"application/json"},
        body:JSON.stringify(createBody)
      });
      const d1=await r1.json();
      if(!r1.ok||!d1.shipmentId) throw new Error(d1.error+(d1.details?"\n"+JSON.stringify(d1.details):"")+(d1.lastStatus?"\n"+JSON.stringify(d1.lastStatus):"")||JSON.stringify(d1));
      // Krok 2: pobierz etykietę PDF
      const r2=await fetch(AUTORESPONDER_URL+"/shipment/label?kontoId="+imp.kontoId,{
        method:"POST",
        headers:{"x-api-key":AUTORESPONDER_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({shipmentIds:[d1.shipmentId],pageSize:"A6"})
      });
      const d2=await r2.json();
      if(!r2.ok||!d2.pdf) throw new Error(d2.error||"Brak PDF");
      // Otwórz PDF do druku
      const pdfBlob=new Blob([Uint8Array.from(atob(d2.pdf),c=>c.charCodeAt(0))],{type:"application/pdf"});
      const pdfUrl=URL.createObjectURL(pdfBlob);
      window.open(pdfUrl,"_blank");
      // Zapisz shipmentId + waybill do ponownego druku i trackingu
      if(shipmentModal.imp.allegroOrderId){
        setAllegroShipments(prev=>{
          const next={...prev,[shipmentModal.imp.allegroOrderId]:{
            shipmentId:d1.shipmentId,

          return next;
        });
        setOrderAppStatus(shipmentModal.imp.allegroOrderId,"W realizacji");
      }
      setShipmentModal(null);
    }catch(e){
      setShipmentError("❌ "+e.message);
    }
    setShipmentCreating(false);
  }

  async function runImpPdf(){
    const wKey=localStorage.getItem('mosk_worker_key')||'';
    if(!wKey){alert('Wpisz klucz Workera w Admin → Ustawienia → Baza danych');return;}
    if(impPdfFiles.length===0){alert('Najpierw wybierz pliki PDF');return;}
    setImpPdfRunning(true);
    const log=[];
    const setLog=l=>{setImpPdfLog([...l]);};
    const liveOrds=await freshOrders();
    const existNums=new Set(liveOrds.map(o=>o.numerZlecenia));
    const newOrds=[];
    let skipped=0,errors=0;
    for(const f of impPdfFiles){
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
      try{
        const resp=await fetch('https://allegro-autoresponder.favour-biuro.workers.dev/pdf/parse',{
          method:'POST',headers:{'Content-Type':'application/json','x-api-key':wKey},
          body:JSON.stringify({pdfBase64:b64,fileName:f.name})
        });
        const d=await resp.json();
        if(!d.ok) throw new Error(d.error||'błąd parsowania');
        const o={...d.order,id:Date.now()+Math.random()};
        if(existNums.has(o.numerZlecenia)){
          log.push('⏭️ Pominięto: '+o.numerZlecenia+' (już istnieje)');
          skipped++;
        } else {
          newOrds.push(o);
          existNums.add(o.numerZlecenia);
          log.push('✅ '+o.numerZlecenia+' | '+o.klientImie+' | '+(o.pozycje?.length||0)+' poz.');
        }
      }catch(err){
        log.push('❌ '+f.name+': '+err.message);
        errors++;
      }
      setLog(log);
      await new Promise(r=>setTimeout(r,1200));
    }
    if(newOrds.length>0){
      const allOrds=[...newOrds,...liveOrds];
      updateOrders(allOrds);
      log.push('💾 Zapisano '+newOrds.length+' zamówień do bazy KV');
    }
    setImpPdfSummary({added:newOrds.length,skipped,errors});
    setLog(log);
    setImpPdfRunning(false);
  }

  function mapPozycje(poz,fD,fO){
    if(!poz?.length) return [];
    return poz.map(p=>{
      const d=fD?true:fO?false:!!p.isDrzwi;
      const s=parseFloat(p.szerokosc)||0,w=parseFloat(p.wysokosc)||0;
      const sz=s>w&&w>0?w:s,wy=s>w&&w>0?s:w;
      if(d) return {isDrzwi:true,szerokosc:String(sz||p.szerokosc||""),szer2:p.szer2||"",
        wysokosc:String(wy||p.wysokosc||""),wys2:p.wys2||"",
        kolorRamki:p.kolorRamki||"Antracyt",kolorSiatki:p.kolorSiatki||"Czarna",
        zawias:p.zawias||"L",poprzeczka:p.poprzeczka!=null?p.poprzeczka:true,
        samodomykajacyL:p.samodomykajacyL||0,samodomykajacyP:p.samodomykajacyP||0,
        ilosc:p.ilosc||1,uwagi:p.uwagi||""};
      return {szerokosc:String(sz||p.szerokosc||""),wysokosc:String(wy||p.wysokosc||""),
        glebokosc:String(normalizujGlebokosc(p.glebokosc!=null?p.glebokosc:DOMYSLNA_GLEBOKOS)),
        kolorRamki:p.kolorRamki||"Antracyt",kolorSiatki:p.kolorSiatki||"Czarna",ilosc:p.ilosc||1};
    });
  }

  async function handleParse(){
    if(!wiadomosc.trim()&&!adres.trim()) return;
    setParsing(true);setSaved(false);
    try{
      const r=await parseAI(wiadomosc,adres,withDrzwi?"okno":parseTyp);
      const pozOkna=mapPozycje(r.pozycje,false,!withDrzwi&&parseTyp!=="drzwi");
      let pozDrzwi=[];
      if(withDrzwi&&wiadomoscDrzwi.trim()){
        setParsingDrzwi(true);
        try{const rd=await parseAI(wiadomoscDrzwi,adres,"drzwi");pozDrzwi=mapPozycje(rd.pozycje,true,false);}catch(e2){}
        setParsingDrzwi(false);
      } else if(withDrzwi){pozDrzwi=[pustaPozDrzwi()];}
      setForm(f=>({...f,
        klientImie:r.klientImie||f.klientImie,klientUlica:r.klientUlica||f.klientUlica,
        klientKod:r.klientKod||f.klientKod,klientMiasto:r.klientMiasto||f.klientMiasto,
        telefon:r.telefon||f.telefon,uwagi:f.uwagi,
        pozycje:[...pozOkna,...pozDrzwi].length?[...pozOkna,...pozDrzwi]:f.pozycje
      }));
    }catch(e){
      setParsing(false);setParsingDrzwi(false);
      let msg=e.message||String(e);
      if(msg==="Failed to fetch") msg="Failed to fetch - sprawdź klucz API i Worker.";
      alert("Błąd AI: "+msg);return;
    }
    setParsing(false);
  }

  function updPoz(i,field,val){

  function getStats(ords){
    let totalMosk=0,totalLinka=0,totalBlaszki=0,totalM2=0;
    const kolorCount={};
    ords.forEach(o=>o.pozycje.forEach(p=>{
      const il=parseFloat(p.ilosc)||1;
      totalMosk+=il;
      totalLinka+=obliczJedn(p.szerokosc,p.wysokosc,il);
      totalBlaszki+=8*il;
      totalM2+=(parseFloat(p.szerokosc)||0)*(parseFloat(p.wysokosc)||0)/10000*il;
      const k=p.kolorRamki||"Inne"; kolorCount[k]=(kolorCount[k]||0)+il;
    }));
    return {totalMosk,totalLinka:Math.round(totalLinka*10)/10,totalBlaszki,totalM2:Math.round(totalM2*100)/100,kolorCount};

  async function allegroRefresh(kontaId){
    const clientId=localStorage.getItem('allegro_client_id')||'';
    const secret=localStorage.getItem('allegro_client_secret')||'';
    const refreshes=JSON.parse(localStorage.getItem('allegro_refreshes')||'{}');
    const rt=refreshes[kontaId];
    if(!rt||!clientId||!secret) return false;
    try{
      const r=await fetch(AUTORESPONDER_URL+'/refresh?refresh_token='+encodeURIComponent(rt),{
        method:'POST',
        headers:{'Authorization':'Basic '+btoa(clientId+':'+secret)}
      });
      const d=await r.json();
      if(d.access_token){
        const tokens=JSON.parse(localStorage.getItem('allegro_tokens')||'{}');
        tokens[kontaId]=d.access_token;
        if(d.refresh_token) refreshes[kontaId]=d.refresh_token;
        localStorage.setItem('allegro_tokens',JSON.stringify(tokens));
        localStorage.setItem('allegro_refreshes',JSON.stringify(refreshes));
        setAllegroTokens({...tokens});
        // Auto-sync do workera po refresh (z refresh tokenami)
        const allRefreshes2=JSON.parse(localStorage.getItem('allegro_refreshes')||'{}');
        const workerToks2={};
        Object.keys(tokens).forEach(function(k){if(tokens[k]) workerToks2[k]={access:tokens[k],refresh:allRefreshes2[k]||''};});
        fetch(AUTORESPONDER_URL+'/sync',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AUTORESPONDER_KEY},body:JSON.stringify({tokens:workerToks2})}).catch(()=>{});
        return true;
      }
    }catch(e){}
    return false;
  }

  async function msgLoadThreads(kontoId, retried){
    const k=kontoId||msgKontoRef.current;
    const tok=allegroTokens[k]||"";
    if(!tok){setMsgError("Brak tokenu dla konta "+k+". Zaloguj się w Admin → Allegro.");return;}
    msgKontoRef.current=k;
    setMsgKonto(k);
    setMsgLoading(true); setMsgError(""); setMsgThreads([]); setMsgActiveThread(null); setMsgConvo([]);
    // Sync tokenów (access+refresh) do workera przed załadowaniem
    if(!retried){
      const _acc=JSON.parse(localStorage.getItem("allegro_tokens")||"{}");
      const _ref=JSON.parse(localStorage.getItem("allegro_refreshes")||"{}");
      const _wt={};
      Object.keys(_acc).forEach(function(x){if(_acc[x]) _wt[x]={access:_acc[x],refresh:_ref[x]||""};});
      await fetch(AUTORESPONDER_URL+"/sync",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":AUTORESPONDER_KEY},body:JSON.stringify({tokens:_wt})}).catch(()=>{});
    }
    try{
      const r=await fetch(AUTORESPONDER_URL+"/messaging/threads?kontoId="+k+"&limit=20&offset=0",{
        headers:{"x-api-key":AUTORESPONDER_KEY}
      });
      if(r.status===401){
        if(retried){setMsgError("Sesja wygasła — zaloguj się ponownie w Admin → Allegro.");setMsgLoading(false);return;}
        const ok=await allegroRefresh(k);
        if(ok){msgLoadThreads(k,true);return;}
        setMsgError("Sesja wygasła — zaloguj się ponownie w Admin → Allegro.");
        setMsgLoading(false);return;
      }
      if(!r.ok){
        let errText="";
        try{const ed=await r.json();errText=JSON.stringify(ed);}catch{}
        setMsgError("Błąd API "+r.status+": "+errText);
        setMsgLoading(false);return;
      }
      const d=await r.json();
      setMsgThreads(d.threads||[]);
    }catch(e){setMsgError("Błąd połączenia: "+e.message);}

  }

  async function msgUploadAttachment(file){
    const tok=allegroTokens[msgKontoRef.current]||"";
    // Step 1: declare attachment
    const r1=await fetch(AUTORESPONDER_URL+"/messaging/attachments?kontoId="+msgKontoRef.current,{
      method:"POST",
      headers:{"x-api-key":AUTORESPONDER_KEY,"Content-Type":"application/vnd.allegro.public.v1+json"},
      body:JSON.stringify({filename:file.name,size:file.size})
    });
    if(!r1.ok){
      let errText="";
      try{const ed=await r1.json();errText=JSON.stringify(ed);}catch{}
      setMsgSendError("Błąd deklaracji załącznika "+r1.status+": "+errText);
      return null;
    }
    const d1=await r1.json();
    if(!d1.id){setMsgSendError("Deklaracja nie zwróciła ID: "+JSON.stringify(d1));return null;}
    // Step 2: upload binary
    const r2=await fetch(AUTORESPONDER_URL+"/messaging/attachments/"+d1.id+"?kontoId="+msgKontoRef.current,{
      method:"PUT",
      headers:{"x-api-key":AUTORESPONDER_KEY,"Content-Type":file.type||"application/octet-stream"},
      body:file
    });
    if(!r2.ok){
      let errText="";
      try{const ed=await r2.json();errText=JSON.stringify(ed);}catch{}
      setMsgSendError("Błąd uploadu pliku "+r2.status+": "+errText);
      return null;
    }
    return d1.id;
  }

              <button className="btn" style={{width:"100%",padding:"12px",fontSize:14,background:editingId!==null?"#4a6a2a":"var(--accent)"}}

                <div style={{background:"#0a1e0a",border:"1px solid #2a6a2a",borderRadius:8,padding:"14px 16px",marginTop:8,position:"relative"}}>

                      <button className="btn-pdf" onClick={()=>drukujPDF(lastSavedOrder)}>🧿 PDF okna</button>
                    )}
                    {lastSavedOrder.pozycje.some(p=>p.isDrzwi)&&(
                      <button className="btn-pdf" style={{background:"#1a2a4a"}} onClick={()=>drukujPDF_drzwi(lastSavedOrder)}>🚪 PDF drzwi</button>
                    )}
                    <button className="btn-pdf" style={{background:"#1a3a1a",borderColor:"#3a7a3a",color:"#9fcf9f"}} onClick={()=>{setDpdModal(lastSavedOrder);setDpdWaga("5");}}>📦 Nadaj DPD</button>
                    <button className="btn-pdf" style={{background:"#1a1a3a",borderColor:"#3a3a7a",color:"#af9adf"}} onClick={()=>{
                      const emailCfg=JSON.parse(localStorage.getItem('email_produkcji_config')||'{}');
                      const to=emailCfg.emailProdukcji||'biuro@superis.pl';
                      const subject=`${lastSavedOrder.numerZlecenia||''} ${lastSavedOrder.klientImie||''} ${lastSavedOrder.klientMiasto||''}`.trim();
                      setMailPreview({imp:{...lastSavedOrder,allegroOrderId:allegroOrderIdForForm},order:lastSavedOrder,to,subject,hasEtykieta:false});
                      loadRecentEmails();
                    }}>✉️ Wyślij na produkcję</button>
                  </div>
                </div>
              )}
              {saved&&!lastSavedOrder&&<div style={{textAlign:"center",color:"#afffaf",fontSize:14,marginTop:4}}>✓ Zapisano ☁</div>}
            </div>
          </div>
        )}

        {/* ══ NOWA ZAKŁADKA ZAMÓWIENIA ══ */}

          const MOSK_KEYS=['moskitiera','mosquito'];
          const isMosk=imp=>{const t=((imp.offerNames||'')+(imp.buyerMsg||'')).toLowerCase();return MOSK_KEYS.some(k=>t.includes(k));};
          const filteredAll=allegroImportResults.filter(imp=>{
            if(zamKonto&&imp.kontoId!==zamKonto) return false;

            return true;
          });
          const moskitiery=filteredAll.filter(isMosk);
          const reszta=filteredAll.filter(imp=>!isMosk(imp));

          const fmtDT=iso=>{if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('pl-PL')+' '+d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});};
          const toggleBox=(id,box)=>setZamOpenBox(prev=>({...prev,[id]:prev[id]===box?null:box}));
          const renderRow=(imp,idx,isMoskitiera)=>{
            const [kBg,kCol]=KONTO_COLORS[imp.kontoId]||['#2a2a2a','#9a9a9a'];
            const as=appStatuses[imp.allegroOrderId]||'';
            const sh=allegroShipments[imp.allegroOrderId];
            const hasZlecenie=!!orders.find(o=>o.allegroOrderId===imp.allegroOrderId);
            const hasEtykieta=!!sh;
            const isRealizacja=as==='W realizacji'||as==='Wysłano';
            const openBox=zamOpenBox[imp.allegroOrderId];
            return (
              <div key={idx} style={{borderBottom:'1px solid #0f1f2f',background:isRealizacja?'#0a1a0a':'#0a1020',opacity:as==='Wysłano'?0.55:1}}>

                  <div style={{minWidth:76}}>
                    <span style={{fontSize:11,padding:'2px 5px',borderRadius:5,background:kBg,color:kCol,fontFamily:'monospace',fontWeight:700,display:'inline-block'}}>{imp.kontoId}</span>
                    <div style={{fontSize:10,color:'#3a6a4a',marginTop:1}}>{imp.firma==='F'?'Favour':imp.firma==='AR'||imp.firma==='A'?'Arlis':imp.firma==='E'?'Everis':'Albama'}</div>

                  <div style={{minWidth:100,fontSize:11,color:'#5a8abf'}}>{imp.boughtAt?fmtDT(imp.boughtAt):imp.data||'—'}</div>

                    <div style={{fontWeight:600,color:isRealizacja?'#5a9a5a':'#a0cfdf',fontSize:13}}>{isRealizacja&&'✅ '}{imp.klientImie||'—'}</div>

                    {imp.klientMiasto&&<div style={{fontSize:10,color:'#4a7a6a'}}>{imp.klientMiasto}</div>}

                  </div>
                  <select value={as} onChange={e=>setOrderAppStatus(imp.allegroOrderId,e.target.value)}
                    style={{padding:'3px 5px',fontSize:11,borderRadius:4,cursor:'pointer',

                      border:`1px solid ${as==='Wysłano'?'#3a7a3a':as==='W realizacji'?'#5a7a2a':as==='Nowe'?'#3a3a7a':'#2a3a2a'}`,

                    <option value="Nowe">🆕 Nowe</option>
                    <option value="W realizacji">⚙️ W realizacji</option>
                    <option value="Wysłano">✅ Wysłano</option>
                  </select>

                    {isMoskitiera&&<button onClick={()=>toggleBox(imp.allegroOrderId,'zlecenie')} title="Zlecenie"

                        background:openBox==='zlecenie'?'#2a4a2a':hasZlecenie?'#1a3a1a':'#1a2a1a',
                        border:`1px solid ${hasZlecenie?'#3a7a3a':'#2a4a2a'}`,color:hasZlecenie?'#7acf7a':'#4a7a4a'}}>
                      📋{hasZlecenie?' ✅':''}
                    </button>}
                    <button onClick={()=>{
                        if(imp.kontoId){
                          openShipmentModal(imp);
                        } else {
                          // Brak kontoId = zamówienie telefoniczne → DPD API
                          const orderForDpd=orders.find(o=>o.allegroOrderId===imp.allegroOrderId)||{klientImie:imp.klientImie,klientUlica:imp.klientUlica,klientKod:imp.klientKod,klientMiasto:imp.klientMiasto,telefon:imp.telefon};
                          setDpdModal(orderForDpd);setDpdWaga('5');
                        }
                      }} title={imp.kontoId?"Etykieta Allegro":"Etykieta DPD API"}
                      style={{padding:'4px 8px',fontSize:12,borderRadius:5,cursor:'pointer',fontWeight:700,
                        background:hasEtykieta?'#1a3a1a':'#1a2a1a',border:`1px solid ${hasEtykieta?'#5a7a2a':'#2a4a2a'}`,color:hasEtykieta?'#afdf7f':'#6a8a4a'}}>
                      📦{hasEtykieta?' ✅':''}
                    </button>

                        const emailCfg=JSON.parse(localStorage.getItem('email_produkcji_config')||'{}');

                        const order=orders.find(o=>o.allegroOrderId===imp.allegroOrderId)||imp;
                        const subject=`${order.numerZlecenia||imp.allegroOrderId||''} ${imp.klientImie||''} ${imp.klientMiasto||''}`.trim();

                      style={{padding:'4px 8px',fontSize:12,borderRadius:5,cursor:'pointer',background:'#1a1a3a',border:'1px solid #3a3a7a',color:'#9a9adf'}}>
                      ✉️
                    </button>
                    <button onClick={()=>{setSelectedOrderId(imp.allegroOrderId);setSelectedKontoId(imp.kontoId);setTab('wiadomosci');}} title="Wiadomości"

                    <a href={`https://allegro.pl/transakcja/${imp.allegroOrderId}`} target="_blank" rel="noreferrer"

                {openBox==='zlecenie'&&(

                      style={{padding:'5px 12px',fontSize:13,fontWeight:700,borderRadius:5,cursor:'pointer',background:'#1a3a1a',border:'1px solid #3a7a3a',color:'#afffaf'}}>
                      📋 Otwórz formularz zlecenia
                    </button>
                    {hasZlecenie&&(()=>{const o=orders.find(ord=>ord.allegroOrderId===imp.allegroOrderId);return <span style={{fontSize:12,color:'#5a9a5a'}}>✅ {o?.numerZlecenia} — {o?.klientImie}</span>;})()}
                  </div>
                )}
              </div>
            );
          };
          return (
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
                <button onClick={fetchAllegroOrders} disabled={allegroImportLoading}
                  style={{padding:'6px 16px',fontSize:14,fontWeight:700,cursor:allegroImportLoading?'not-allowed':'pointer',background:allegroImportLoading?'#1a2a2a':'#1a3a4a',border:'1px solid #2a6a8a',borderRadius:6,color:'#7acfdf'}}>
                  {allegroImportLoading?'⟳ Pobieranie...':'📥 Pobierz zamówienia'}
                </button>
                <input value={zamSearch} onChange={e=>setZamSearch(e.target.value)} placeholder="Szukaj..."
                  style={{padding:'5px 10px',fontSize:13,background:'#0a1a0a',border:'1px solid #1a3a1a',borderRadius:5,color:'#7acf9f',width:180}}/>
                <select value={zamKonto} onChange={e=>setZamKonto(e.target.value)}
                  style={{padding:'5px 8px',fontSize:13,background:'#0a1420',border:'1px solid #1a3a5a',borderRadius:5,color:'#7abfdf'}}>
                  <option value="">Wszystkie konta</option>
                  {[...new Set(allegroImportResults.map(i=>i.kontoId))].map(k=><option key={k} value={k}>{k}</option>)}
                </select>
                <button onClick={()=>setTab('nowe')} style={{padding:'5px 12px',fontSize:13,fontWeight:700,borderRadius:5,cursor:'pointer',background:'#1a3a1a',border:'1px solid #3a7a3a',color:'#afffaf',marginLeft:'auto'}}>
                  ➕ Dodaj ręcznie
                </button>
              </div>
              <div style={{display:'flex',borderBottom:'2px solid #1a2a1a',marginBottom:0}}>
                <button onClick={()=>setZamTab('moskitiery')} style={{padding:'7px 18px',fontSize:14,fontWeight:700,cursor:'pointer',border:'none',borderRadius:'6px 6px 0 0',background:zamTab==='moskitiery'?'#1a3a1a':'#0a1a0a',color:zamTab==='moskitiery'?'#afffaf':'#3a6a3a',borderBottom:zamTab==='moskitiery'?'2px solid #3acf6a':'2px solid transparent'}}>
                  🦟 Moskitiery ({moskitiery.length})
                </button>
                <button onClick={()=>setZamTab('pozostale')} style={{padding:'7px 18px',fontSize:14,fontWeight:700,cursor:'pointer',border:'none',borderRadius:'6px 6px 0 0',background:zamTab==='pozostale'?'#1a2a3a':'#0a1420',color:zamTab==='pozostale'?'#7acfdf':'#2a4a6a',borderBottom:zamTab==='pozostale'?'2px solid #3a8acf':'2px solid transparent'}}>
                  📦 Pozostałe ({reszta.length})
                </button>
              </div>
              {allegroImportResults.length===0&&<div style={{textAlign:'center',color:'#2a5a3a',padding:'40px 0',fontSize:14}}>Kliknij "Pobierz zamówienia" żeby załadować listę</div>}
              {(()=>{
                const active=zamTab==='moskitiery'?moskitiery:reszta;
                if(active.length===0&&allegroImportResults.length>0) return <div style={{textAlign:'center',color:'#3a5a3a',padding:'40px 0'}}>Brak zamówień</div>;
                return <div style={{border:'1px solid #1a2a1a',borderTop:'none',borderRadius:'0 0 6px 6px',overflow:'hidden'}}>{active.map((imp,idx)=>renderRow(imp,idx,zamTab==='moskitiery'))}</div>;
              })()}
            </div>
          );
        })()}

        {/* ══ ZAMÓWIENIA ══ */}
        {tab==="al_zam" && (
          <div>
            {/* Nagłówek + przycisk pobierz */}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
              <span style={{fontSize:14,color:"#3a7a9a",letterSpacing:".12em",textTransform:"uppercase",fontWeight:700}}>🛒 Zamówienia Allegro</span>
              <button
                onClick={fetchAllegroOrders}
                disabled={allegroImportLoading}
                style={{padding:"6px 18px",fontSize:14,fontWeight:700,cursor:allegroImportLoading?"not-allowed":"pointer",
                  background:allegroImportLoading?"#1a2a2a":"#1a3a4a",border:"1px solid #2a6a8a",borderRadius:6,color:"#7acfdf"}}>
                {allegroImportLoading?"⟳ Pobieranie...":"📥 Pobierz zamówienia"}
              </button>
              <input value={alZamSearch} onChange={e=>setAlZamSearch(e.target.value)}
                placeholder="🔍 Szukaj: klient, login, miasto..."
                style={{fontSize:14,width:220,padding:"5px 10px"}}/>
              <select value={alZamKonto} onChange={e=>setAlZamKonto(e.target.value)}
                style={{fontSize:14,padding:"5px 8px"}}>
                <option value="">Wszystkie konta</option>
                {["favo5","staroleska_pl","sinlook_pl","arlis_pl","everis_pl","albama_eu"].filter(k=>allegroTokens[k]).map(k=>(
                  <option key={k} value={k}>{k}</option>
                ))}
              </select>
              {/* Legenda kont */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginLeft:"auto"}}>
                {[["favo5","#2a5a3a","#7fcf7f"],["staroleska_pl","#2a4a2a","#5abf7a"],["sinlook_pl","#1a4a3a","#4abf9a"],
                  ["arlis_pl","#2a3a5a","#7abfdf"],["everis_pl","#3a2a5a","#af8fdf"],
                  ["albama_eu","#4a3a1a","#dfaf5a"],["pedroshop_pl_365","#3a2a1a","#cf8a4a"]
                ].map(([k,bg,col])=>{
                  const hasTok=!!(allegroTokens[k]||"");
                  return hasTok?(
                    <span key={k} style={{fontSize:14,padding:"2px 8px",borderRadius:10,background:bg,color:col,fontFamily:"monospace",fontWeight:700}}>{k}</span>
                  ):null;
                })}
              </div>
            </div>

            {allegroImportError&&<div style={{marginBottom:12,padding:"8px 14px",background:"#2a1a1a",border:"1px solid #5a2a2a",borderRadius:6,color:"#df8080",fontSize:14}}>{allegroImportError}</div>}

            {!allegroImportShow&&!allegroImportLoading&&(
              <div style={{textAlign:"center",padding:"60px 0",color:"#2a5a6a",fontSize:14}}>
                Kliknij "📥 Pobierz zamówienia" aby załadować najnowsze zamówienia ze wszystkich kont
              </div>
            )}

            {allegroImportShow&&allegroImportResults.length>0&&(
              <div style={{background:"#0a1828",border:"1px solid #2a4a7a",borderRadius:8,overflow:"hidden"}}>
                <div style={{padding:"10px 16px",borderBottom:"1px solid #1a3a5a",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:700,color:"#7abfdf",fontSize:14}}>
                    {allegroImportResults.filter(r=>!r.alreadyExists).length} nowych
                    <span style={{fontWeight:400,color:"#4a7a9a"}}> / {allegroImportResults.length} łącznie</span>
                  </span>
                  <button onClick={()=>setAllegroImportShow(false)} style={{marginLeft:"auto",background:"none",border:"none",color:"#5a7a9a",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
                    <thead>
                      <tr style={{background:"#0c1a2a",borderBottom:"1px solid #1a3a5a"}}>
                        {["Konto / Firma","Data","Klient","Miasto","Produkt","Status",""].map((h,i)=>(
                          <th key={i} style={{padding:"8px 12px",textAlign:"left",fontSize:14,color:"#3a6a9a",letterSpacing:".08em",textTransform:"uppercase",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {allegroImportResults
                        .filter(imp=>{
                          if(alZamKonto && imp.kontoId!==alZamKonto) return false;
                          if(alZamSearch){
                            const q=alZamSearch.toLowerCase();
                            return (imp.klientImie||"").toLowerCase().includes(q)||
                              (imp.klientLogin||"").toLowerCase().includes(q)||
                              (imp.klientMiasto||"").toLowerCase().includes(q)||
                              (imp.allegroOrderId||"").toLowerCase().includes(q);
                          }
                          return true;
                        })
                        .map((imp,idx)=>{
                        const KONTO_COLORS={
                          "favo5":["#2a5a3a","#7fcf7f"],"staroleska_pl":["#2a4a2a","#5abf7a"],"sinlook_pl":["#1a4a3a","#4abf9a"],
                          "arlis_pl":["#2a3a5a","#7abfdf"],"everis_pl":["#3a2a5a","#af8fdf"],
                          "albama_eu":["#4a3a1a","#dfaf5a"],"pedroshop_pl_365":["#3a2a1a","#cf8a4a"]
                        };
                        const [kBg,kCol]=KONTO_COLORS[imp.kontoId]||["#2a2a2a","#9a9a9a"];
                        const as=appStatuses[imp.allegroOrderId]||"";
                        const isObrobione=as==="W realizacji"||as==="Wysłano";
                        return (
                          <tr key={idx} style={{borderBottom:"1px solid #0f1f2f",background:isObrobione?"#0a1a0a":imp.alreadyExists?"transparent":"#0a1420",opacity:imp.alreadyExists?0.4:isObrobione?0.6:1,transition:"opacity .15s"}}>
                            <td style={{padding:"8px 12px"}}>
                              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                                <span style={{fontSize:14,padding:"2px 7px",borderRadius:8,background:kBg,color:kCol,fontFamily:"monospace",fontWeight:700,display:"inline-block",width:"fit-content"}}>{imp.kontoId}</span>
                                <span style={{fontSize:14,color:"#4a6a4a"}}>{imp.firma==="F"?"Favour":imp.firma==="AR"?"Arlis":imp.firma==="A"?"Arlis":imp.firma==="E"?"Everis":"Albama"}</span>
                              </div>
                            </td>
                            <td style={{padding:"8px 12px",color:"#7a9abf",whiteSpace:"nowrap"}}>{imp.data}</td>
                            <td style={{padding:"8px 12px",maxWidth:140,overflow:"hidden"}} title={[imp.klientImie,imp.klientLogin,imp.klientMiasto].filter(Boolean).join(" | ")}>
                              <div style={{fontWeight:imp.alreadyExists?400:600,color:isObrobione?"#5a8a5a":"#a0cfdf",display:"flex",alignItems:"center",gap:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>

                              </div>
                              {imp.klientLogin&&<div style={{fontSize:12,color:"#3a6a8a",fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{imp.klientLogin}</div>}

                                <div style={{marginTop:2,display:"flex",alignItems:"center",gap:3,background:"#1a3a1a",border:"1px solid #3a7a3a",borderRadius:4,padding:"1px 5px",width:"fit-content"}}>
                                  <span style={{fontSize:9,color:"#5fcf7f",fontWeight:700,fontFamily:"monospace"}}>{kal.orderNumber}</span>
                                  {kal.status==="zrealizowane"?<span style={{fontSize:9,color:"#7a9a7a"}}>✓</span>:<span style={{fontSize:9,color:"#ffcf6f"}}>⏳</span>}

              const szer = parseFloat(p.szerokosc)||0;
              const wys = parseFloat(p.wysokosc)||0;
              const il = parseInt(p.ilosc)||1;
              const kR = p.kolorRamki||"";
              const kS = p.kolorSiatki||"Czarna";
              if(!szer||!wys) return;

              // Profil mb
              const profilCm = ((szer-3.4)*2 + (wys-3.4)*2) * prodOdpadProfil;
              const profilMb = profilCm/100 * il;
              if(RAL_KOLORY.some(k=>kR.includes(k))) profilRAL += profilMb;
              else profilStruktura += profilMb;

              // Siatka
              const krotszy = Math.min(szer, wys);
              const dluzszy = Math.max(szer, wys);
              const siatkaDl = (dluzszy + 20)/100 * il; // mb
              if(krotszy <= 90){
                if(kS==="Szara") siatkaSzara100+=siatkaDl; else siatkaCzarna100+=siatkaDl;
              } else if(krotszy <= 130){
                if(kS==="Szara") siatkaSzara140+=siatkaDl; else siatkaCzarna140+=siatkaDl;

                if(kS==="Szara") siatkaSzara160+=siatkaDl; else siatkaCzarna160+=siatkaDl;

                const popDl = (krotszy-3.4)/100 * il;
                poprzeczki += popDl;
                laczniki += 2*il;
              }

              totalSztOk += il;

                💾 Zapisz
              </button>
              {settingsSaved&&<span style={{marginLeft:12,color:"#afffaf",fontSize:14}}>✓ Zapisano!</span>}
              <div style={{marginTop:14,padding:"8px 12px",background:settings.apiKey&&settings.binId?"#0c180c":"#1a1000",border:`1px solid ${settings.apiKey&&settings.binId?"#1a3a1a":"#3a2a00"}`,borderRadius:4,fontSize:14,color:settings.apiKey&&settings.binId?"#5a9a5a":"#8a7a3a"}}>
                {settings.apiKey&&settings.binId?"✅ Synchronizacja aktywna":"⚠️ Brak konfiguracji — dane lokalne"}
              </div>
            </div>
          </div>
        )}

      </div>

      {/* ── GLOBALNE MODAŁY (dostępne z każdej zakładki) ── */}
      {shipmentModal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={e=>{if(e.target===e.currentTarget){setShipmentModal(null);setShipmentError("");}}}>
          <div style={{background:"#0c1a0c",border:"1px solid #3a7a3a",borderRadius:12,padding:24,width:420,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:700,fontSize:15,color:"#afdf7f",marginBottom:16}}>📦 Generuj etykietę</div>
            <div style={{marginBottom:12,fontSize:14,color:"#7a9a7a"}}>
              <div style={{fontWeight:700,color:"#a0cfdf"}}>{shipmentModal.imp.klientImie}</div>
              <div>{shipmentModal.imp.klientUlica}</div>
              <div>{shipmentModal.imp.klientKod} {shipmentModal.imp.klientMiasto}</div>
            </div>
            {shipmentLoading&&<div style={{color:"#7abfdf",marginBottom:8}}>⟳ Pobieranie usług...</div>}
            {shipmentError&&<div style={{color:"#cf4a4a",marginBottom:8,fontSize:13}}>❌ {shipmentError}</div>}
            {!shipmentLoading&&shipmentModal.services&&shipmentModal.services.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:13,color:"#6aaa6a",marginBottom:6}}>Usługa dostawy:</div>
                <select value={shipmentServiceId} onChange={e=>setShipmentServiceId(e.target.value)}
                  style={{width:"100%",background:"#0e1a0e",border:"1px solid #2a4a2a",borderRadius:5,color:"#afffaf",padding:"6px 10px",fontSize:14}}>
                  {shipmentModal.services.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
            )}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,color:"#6aaa6a",marginBottom:6}}>Zawartość paczki:</div>
              <input value={shipmentDescription} onChange={e=>setShipmentDescription(e.target.value)}
                style={{width:"100%",boxSizing:"border-box",background:"#0e1a0e",border:"1px solid #2a4a2a",borderRadius:5,color:"#c0e0c0",padding:"6px 10px",fontSize:14,fontFamily:"monospace"}}/>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {["A","B","C","custom"].map(sz=>(
                <button key={sz} onClick={()=>setShipmentSize(sz)}
                  style={{padding:"4px 10px",fontSize:12,borderRadius:4,cursor:"pointer",
                    background:shipmentSize===sz?"#2a5a2a":"#1a2a1a",
                    border:`1px solid ${shipmentSize===sz?"#5a9a5a":"#2a4a2a"}`,color:"#9fcf9f"}}>
                  {sz==="custom"?"Własny":sz}
                </button>
              ))}
            </div>
            {shipmentSize==="custom"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {["length","width","height","weight"].map(f=>(
                  <div key={f}>
                    <label style={{fontSize:11,color:"#4a7a4a",display:"block"}}>{f==="weight"?"Waga (kg)":f==="length"?"Dł (cm)":f==="width"?"Szer (cm)":"Wys (cm)"}</label>
                    <input type="number" value={shipmentCustomSize[f]} onChange={e=>setShipmentCustomSize(p=>({...p,[f]:parseFloat(e.target.value)||0}))}
                      style={{width:"100%",padding:"4px 6px",fontSize:13,background:"#0a1a0a",border:"1px solid #2a4a2a",borderRadius:4,color:"#9fcf9f"}}/>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setShipmentModal(null);setShipmentError("");}}
                style={{flex:1,padding:"8px",fontSize:14,borderRadius:6,cursor:"pointer",background:"#1a2a1a",border:"1px solid #2a4a2a",color:"#5a8a5a"}}>
                Anuluj
              </button>
              <button disabled={shipmentCreating||!shipmentServiceId}
                onClick={()=>createShipment()}
                style={{flex:2,padding:"8px",fontSize:14,fontWeight:700,borderRadius:6,cursor:shipmentCreating?"not-allowed":"pointer",
                  background:shipmentCreating?"#1a2a1a":"#2a5a1a",border:"1px solid #3a8a2a",color:"#afffaf"}}>
                {shipmentCreating?"⟳ Tworzę...":"📦 Utwórz etykietę"}
              </button>
            </div>
          </div>
        </div>
      )}
      {mailPreview&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={e=>{if(e.target===e.currentTarget)setMailPreview(null);}}>
          <div style={{background:"#0c1a0c",border:"1px solid #3a5a7a",borderRadius:12,padding:24,width:460,maxWidth:"95vw"}}>
            <div style={{fontWeight:700,fontSize:15,color:"#af9adf",marginBottom:16}}>✉️ Wyślij na produkcję</div>
            <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:"#4a7a9a",whiteSpace:"nowrap",fontSize:13}}>Do:</span>
              <input value={mailPreview.to} onChange={e=>setMailPreview(p=>({...p,to:e.target.value}))}
                list="recent-emails-list-g" autoComplete="off"
                style={{flex:1,background:"#0a140a",border:"1px solid #2a4a2a",borderRadius:4,color:"#a0cfdf",padding:"4px 8px",fontSize:13,fontFamily:"monospace"}}/>
              <datalist id="recent-emails-list-g">{recentEmails.map((em,i)=><option key={i} value={em}/>)}</datalist>
            </div>
            {recentEmails.length>0&&(
              <div style={{marginBottom:8,display:"flex",flexWrap:"wrap",gap:4,paddingLeft:32}}>
                {recentEmails.slice(0,6).map((em,i)=>(
                  <button key={i} type="button" onClick={()=>setMailPreview(p=>({...p,to:em}))}
                    style={{padding:"2px 8px",fontSize:11,borderRadius:3,border:"1px solid #2a4a4a",background:mailPreview.to===em?"#1a3a4a":"#0a1a1a",color:"#7acfdf",cursor:"pointer"}}>
                    {em}
                  </button>
                ))}
              </div>
            )}
            <div style={{marginBottom:6,fontSize:13}}><span style={{color:"#4a7a9a"}}>Temat:</span> <strong style={{color:"#cfdfaf"}}>{mailPreview.subject}</strong></div>
            <div style={{fontSize:12,marginBottom:12}}>
              <div style={{color:"#7acf7a"}}>📄 {mailPreview.subject} L.pdf</div>
              {mailPreview.hasEtykieta?<div style={{color:"#7acf7a"}}>📦 etykieta.pdf</div>:<div style={{color:"#cf9a4a"}}>⚠️ Brak etykiety</div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setMailPreview(null)}
                style={{flex:1,padding:"8px",fontSize:14,borderRadius:6,cursor:"pointer",background:"#1a2a1a",border:"1px solid #2a4a2a",color:"#5a8a5a"}}>Anuluj</button>
              <button onClick={sendMailConfirmed}
                style={{flex:2,padding:"8px",fontSize:14,fontWeight:700,borderRadius:6,cursor:"pointer",background:"#1a2a4a",border:"1px solid #2a4a8a",color:"#9aafdf"}}>✉️ Wyślij</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(React.StrictMode,null,React.createElement(App)));
</script>
</body></html>
